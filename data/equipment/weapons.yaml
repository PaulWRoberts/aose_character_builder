# Weapons.  `damage.default` is the 1d6 used under the standard rule;
# `damage.variable` is used when the Variable Weapon Damage optional rule
# is in effect.  `proficiency_group` ties related weapons together for the
# Weapon Proficiency optional rule.

# ── Bludgeons ──────────────────────────────────────────────
- id: club
  item_type: weapon
  name: Club
  category: weapons
  cost_gp: 3
  weight_cn: 50
  damage: { default: "1d6", variable: "1d4" }
  hands: 1
  proficiency_group: bludgeon

- id: mace
  item_type: weapon
  name: Mace
  category: weapons
  cost_gp: 5
  weight_cn: 30
  damage: { default: "1d6", variable: "1d6" }
  hands: 1
