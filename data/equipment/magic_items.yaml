# Magic items (Phase-2 import): potions, rings, rods/staves/wands, misc.
# All MagicItem variants. cost_gp: 0 (Add-only, GM grant). Descriptions are
# transcribed verbatim from import/markdown/magic-items/*.md.

# ─── Rings ────────────────────────────────────────────────────────────────────

- id: ring_control_animals
  item_type: magic
  name: Ring of Controlling Animals
  category: magic_rings
  cost_gp: 0
  magic: true
  equippable: true
  description: |-
    Grants the power to control 1d6 normal animals or 1 giant animal (not
    magical or intelligent). No saving throw is allowed. Only animals in
    visual range can be controlled; control is broken if the user moves or
    attacks. When concentration ends, a reaction roll with -1 penalty
    determines the animals' behaviour. May be used once per turn.

- id: ring_control_humans
  item_type: magic
  name: Ring of Controlling Humans
  category: magic_rings
  cost_gp: 0
  magic: true
  equippable: true
  description: |-
    Grants the power to charm humans. A charm may be placed upon a human
    within 60' (one target per round). The subject may save vs spells (-2
    penalty) to resist. Up to 6 Hit Dice of humans may be charmed; normal
    humans count as ½ HD. Charmed individuals obey the character's commands
    (not obviously harmful, not against their alignment). The charm lasts
    until dispelled, the ring is removed, or the wearer cancels it.

- id: ring_control_plants
  item_type: magic
  name: Ring of Controlling Plants
  category: magic_rings
  cost_gp: 0
  magic: true
  equippable: true
  description: |-
    Grants the power to control all plants (including plant monsters) in a
    10' square area up to 60' distant. Affected plants may be commanded to
    move. The effect lasts while the wearer concentrates.

- id: ring_delusion
  item_type: magic
  name: Ring of Delusion
  category: magic_rings
  cost_gp: 0
  magic: true
  equippable: true
  description: |-
    The wearer believes they are under the effects of another type of magic
    ring (determined by the referee). The referee should trick the player
    into believing the other ring's effects, revealing the truth only at a
    vital juncture.

- id: ring_djinni_summoning
  item_type: magic
  name: Ring of Djinni Summoning
  category: magic_rings
  cost_gp: 0
  magic: true
  equippable: true
  description: |-
    Grants the power to summon a lesser djinni. The djinni serves for up to
    24 hours and obeys only the one who summoned it. May be used once per day.

- id: ring_fire_resistance
  item_type: magic
  name: Ring of Fire Resistance
  category: magic_rings
  cost_gp: 0
  magic: true
  equippable: true
  description: |-
    Grants the wearer protection against fire. Unharmed by non-magical fire.
    +2 bonus to saving throws vs fire-based magical or breath attacks.
    Fire-based damage reduced by 1 per die (minimum 1 per die).

- id: ring_invisibility
  item_type: magic
  name: Ring of Invisibility
  category: magic_rings
  cost_gp: 0
  magic: true
  equippable: true
  description: |-
    The wearer becomes invisible. Attacking or casting a spell breaks the
    invisibility. May be used once per turn.

- id: ring_protection_plus_1
  item_type: magic
  name: Ring of Protection +1
  category: magic_rings
  cost_gp: 0
  magic: true
  equippable: true
  modifiers:
    - {target: ac, op: add, value: 1}
    - {target: "save:all", op: add, value: 1}
  description: |-
    Grants a measure of protection from harm.
    Armour Class: A +1 AC bonus.
    Saving throws: A +1 bonus to all saves.

- id: ring_protection_plus_1_5ft
  item_type: magic
  name: Ring of Protection +1, 5' Radius
  category: magic_rings
  cost_gp: 0
  magic: true
  equippable: true
  modifiers:
    - {target: ac, op: add, value: 1}
    - {target: "save:all", op: add, value: 1}
  description: |-
    As Ring of Protection +1, but allies within 5' of the wearer also benefit
    from the ring's protective power (+1 AC, +1 to all saves).

- id: ring_regeneration
  item_type: magic
  name: Ring of Regeneration
  category: magic_rings
  cost_gp: 0
  magic: true
  equippable: true
  description: |-
    The wearer heals at an accelerated rate: regains 1 hit point per round.
    Severed limbs will also regrow over time. Fire or acid damage cannot be
    regenerated. The ring does not function if the wearer is at 0 or fewer
    hit points.

- id: ring_spell_storing
  item_type: magic
  name: Ring of Spell Storing
  category: magic_rings
  cost_gp: 0
  magic: true
  equippable: true
  charge_dice: "1d6"
  description: |-
    Stores 1d6 magical spells that the wearer can release on command (up to
    one per round). 20% chance of divine spells, otherwise arcane. The wearer
    knows which spells it contains. Once triggered, a spell cannot be reused
    until recharged by casting it directly onto the ring.

- id: ring_spell_turning
  item_type: magic
  name: Ring of Spell Turning
  category: magic_rings
  cost_gp: 0
  magic: true
  equippable: true
  charge_dice: "2d6"
  description: |-
    Spells cast on the wearer are reflected back onto the caster.
    Charges: After 2d6 spells are reflected, the ring loses its power.

- id: ring_telekinesis
  item_type: magic
  name: Ring of Telekinesis
  category: magic_rings
  cost_gp: 0
  magic: true
  equippable: true
  description: |-
    Grants the power to move objects or creatures within 120' by
    concentrating. Up to 2,000 coins of weight may be targeted; moved up to
    20' per round in any direction (including vertically). A targeted creature
    may save vs spells to resist. If concentration is broken, the target falls.

- id: ring_water_walking
  item_type: magic
  name: Ring of Water Walking
  category: magic_rings
  cost_gp: 0
  magic: true
  equippable: true
  description: |-
    Grants the power to walk on the surface of water without sinking.

- id: ring_weakness
  item_type: magic
  name: Ring of Weakness
  category: magic_rings
  cost_gp: 0
  magic: true
  equippable: true
  modifiers:
    - {target: "ability:STR", op: set, value: 3}
  description: |-
    A cursed ring that weakens the wearer. Within 6 rounds of putting it on,
    the wearer's STR is reduced to 3. The ring cannot be removed once worn;
    the curse can be removed by magic (e.g. remove curse) or a special quest.

- id: ring_wishes_1_2
  item_type: magic
  name: Ring of Wishes (1–2)
  category: magic_rings
  cost_gp: 0
  magic: true
  equippable: true
  charge_dice: "1d2"
  description: |-
    Grants the wearer's wishes. Contains 1d2 wishes. Once all wishes are used,
    the ring's magic is spent.

- id: ring_wishes_1_3
  item_type: magic
  name: Ring of Wishes (1–3)
  category: magic_rings
  cost_gp: 0
  magic: true
  equippable: true
  charge_dice: "1d3"
  description: |-
    Grants the wearer's wishes. Contains 1d3 wishes. Once all wishes are used,
    the ring's magic is spent.

- id: ring_wishes_2_4
  item_type: magic
  name: Ring of Wishes (2–4)
  category: magic_rings
  cost_gp: 0
  magic: true
  equippable: true
  charge_dice: "1d3+1"
  description: |-
    Grants the wearer's wishes. Contains 1d3+1 wishes. Once all wishes are
    used, the ring's magic is spent.

- id: ring_xray_vision
  item_type: magic
  name: Ring of X-Ray Vision
  category: magic_rings
  cost_gp: 0
  magic: true
  equippable: true
  description: |-
    Grants the power to see through solid objects. Sight up to 60' through
    less dense materials (cloth, water, wood); up to 30' through stone. Gold
    and lead block sight. When searching, guarantees noticing secret doors or
    traps in the 10' square examined. Concentration required (cannot move).
    May be used at most once per turn.

# ─── Rods, Staves, Wands ──────────────────────────────────────────────────────

- id: rod_immovable
  item_type: magic
  name: Immovable Rod
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    A 4' length of metal which can anchor itself to a point in space. In
    combat: attacks as a +2 magic item, doing 1d6 damage (may be hurled
    5'–20' / 21'–40' / 41'–60'). Anchoring: a command word anchors the rod
    to its current position (unmovable except by a wish; gravity does not
    move it). A second command word releases it. No charges; unlimited use.

- id: rod_absorption
  item_type: magic
  name: Rod of Absorption
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  max_charges: 50
  description: |-
    Usable by spell casters only (divine or arcane). Absorbs spells cast at
    the character (1 charge per spell level), negating their effect and
    storing energy levels. Stored energy may be spent to cast memorised
    spells (spells are not lost from memory when cast this way). Total: 50
    charges.

- id: rod_cancellation
  item_type: magic
  name: Rod of Cancellation
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  max_charges: 1
  description: |-
    Drains the enchantment from a magic item that is touched. In combat:
    requires an attack roll against AC 9 [10] (adjusted if actively used).
    Effect: the touched item becomes utterly non-magical. One use only.

- id: rod_captivation
  item_type: magic
  name: Rod of Captivation
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "1d10"
  description: |-
    Beguiles all intelligent creatures (including animal intelligence) within
    20'. Creatures of human-level intelligence may save vs spells (-2 penalty)
    to resist. Charmed creatures regard the character as a trusted friend and
    ally and obey commands (not suicidal or obviously harmful; contradicting
    nature/alignment may be ignored). Duration: 1 turn per charge.

- id: rod_lordly_might
  item_type: magic
  name: Rod of Lordly Might
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "1d10"
  description: |-
    A thick metal rod with a spherical head and 8 studs along the shaft.
    Usable by non-spell-casting martial characters (e.g. fighters) only.
    In combat: wields as a mace +2; STR < 16 incurs -2 to attack rolls.
    Studs (each uses 1 charge unless noted): (a) Paralysis — save vs spells
    or paralysed 6 turns; (b) Fear — cone 60'×30', save vs spells or flee
    10 rounds; (c) Life drain — 2d4 melee damage, wielder gains same HP;
    (d) Flaming sword +1 (no charge); (e) Battle axe +3 (no charge);
    (f) Spear +2 (no charge); (g) Ladder up to 50' long (no charge);
    (h) Orientation — current elevation and north direction (no charge).
    Once all charges expended, studs a–e no longer function.

- id: rod_parrying
  item_type: magic
  name: Rod of Parrying
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    A 5' metal rod providing offensive and defensive melee capability.
    Attacking: attacks as +2 magic item, doing 1d8 damage. Parrying:
    instead of attacking, gain +4 AC bonus vs melee attacks for one round
    (cannot parry while retreating). No charges; unlimited use.

- id: rod_resurrection
  item_type: magic
  name: Rod of Resurrection
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "1d10"
  description: |-
    Usable by divine spell casters only. Restores a deceased person within
    120' to life with full hit points (dead up to 100 years). Charges per
    use depend on the subject's race: Human 1, Half-elf 2, Halfling 2,
    Dwarf/Gnome 3, Elf 4, Half-orc 4, Other 4. May be used at most once
    per day.

- id: rod_striking
  item_type: magic
  name: Rod of Striking
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "1d10"
  description: |-
    A rod which can be used as a weapon and is especially potent against
    constructs and chaotic extra-planar monsters. Attacks as +3 magic item,
    doing 1d8 damage. Against constructs: each hit expends one charge and
    inflicts double damage; natural 20 destroys the construct instantly.
    Against chaotic extra-planar monsters: natural 20 expends one charge and
    inflicts triple damage.

- id: staff_commanding
  item_type: magic
  name: Staff of Commanding
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "3d10"
  description: |-
    Grants the power to control animals, humans, and plants (each costs one
    charge). Animals: controls 1d6 normal or 1 giant animal (not magical/
    intelligent); no save; broken if user moves or attacks. Humans: charm a
    human within 60' (save vs spells -2); up to 6 HD; lasts indefinitely.
    Plants: all plants in a 10' square up to 60' distant; lasts while
    concentrating.

- id: staff_dispelling
  item_type: magic
  name: Staff of Dispelling
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "3d10"
  description: |-
    Dispels any magical effect which is touched. Spells: if the original
    caster is above 9th level, 5% chance per level difference of failure.
    One-use magic items are destroyed; permanent items are rendered
    non-magical for 1d4 rounds.

- id: staff_healing
  item_type: magic
  name: Staff of Healing
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    Usable by divine spell casters only. Heals 1d6+1 hit points with each
    use. Effective on any individual at most once per day. No charges;
    unlimited use.

- id: staff_power
  item_type: magic
  name: Staff of Power
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "3d10"
  description: |-
    Usable by arcane spell casters only. Melee: 2d6 damage on a hit (1
    charge). Cone of cold: 60' long, 30' wide, 8d6 damage (save vs spells
    for half). Spells (each 1 charge): continual light, fire ball (8d6),
    lightning bolt (8d6), telekinesis (up to 2,400 coins of weight).

- id: staff_snakes
  item_type: magic
  name: Staff of Snakes
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    Usable by divine spell casters only. In melee: +1 magic bonus to attacks
    and damage. On a successful hit against a human-sized (or smaller)
    creature: speak the command word to transform the staff into a serpent
    that coils around the victim (save vs spells or immobilised 1d4 turns).
    Snake: AC 5 [14], HD 3 (20hp), MV 60' (20'). When released, snake
    returns and reverts to staff form (healed of damage). If the snake is
    killed it does not revert. No charges; unlimited use.

- id: staff_striking
  item_type: magic
  name: Staff of Striking
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "3d10"
  description: |-
    Used as a magical melee weapon. Expending one charge inflicts 2d6 damage
    on a successful hit. Only one charge may be spent per strike.

- id: staff_swarming_insects
  item_type: magic
  name: Staff of Swarming Insects
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "3d10"
  description: |-
    Usable by divine spell casters only. Summons a swarm of biting insects
    onto a target within 60' + 10' per level of the wielder. The target
    cannot act for 1 round and suffers 6 damage + 1 per level of the
    wielder. Creatures larger than human-sized or with natural AC better
    than 5 [14] are unaffected.

- id: staff_of_the_healer
  item_type: magic
  name: Staff of the Healer
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "3d10"
  description: |-
    Usable by divine spell casters only. Each use (1 charge) has one of
    three effects: (a) Cure wounds: 3d6+3 hit points; (b) Cure disease;
    (c) Cure blindness. Each function may be used up to twice per day. A
    single subject can only be affected once per day.

- id: staff_withering
  item_type: magic
  name: Staff of Withering
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "3d10"
  description: |-
    Usable by divine spell casters only. Creatures hit by the staff are
    magically aged 10 years; living creatures die upon reaching their natural
    lifespan. Long-lived species ignore some ageing (elves: 200 years;
    dwarves: 50 years, etc.). Undead are unaffected.

- id: staff_wizardry
  item_type: magic
  name: Staff of Wizardry
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "3d10"
  description: |-
    Usable by arcane spell casters only. In melee: +1 magic bonus to attacks
    and damage. Striking: 2d6 damage (1 charge). Cone of cold: 60'×30',
    8d6 (save vs spells for half). Paralysation cone: 60'×30', paralysed
    6 turns (save vs spells to avoid). Spells (1 charge each): conjure
    elemental (8 HD), continual light, fire ball (8d6), invisibility,
    lightning bolt (8d6), pass-wall, telekinesis (2,400 coins), web.
    Whirlwind (1 charge): 70' tall, 20'/10' wide, lasts 3 rounds, 2d6
    damage; creatures < 2 HD swept aside (save vs death to avoid).
    Sacrifice: break the staff to release a 30' radius fireball inflicting
    8 damage per remaining charge (wielder also suffers this damage).

- id: staff_of_the_woodlands
  item_type: magic
  name: Staff of the Woodlands
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "3d10"
  description: |-
    Usable by divine spell casters with druidic magic only. Melee: acts as
    a +2 staff. Animate tree (1 charge): a large tree within 30' comes alive
    under the wielder's control (AC 2 [17], HD 8, Att 2×fist 2d6, MV 30').
    Spells (1 charge each): animal friendship, speak with animals, wall of
    thorns.

- id: wand_cold
  item_type: magic
  name: Wand of Cold
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "2d10"
  description: |-
    Conjures a cone of freezing energy 60' long and 30' wide at the far end.
    Creatures caught in the cone suffer 6d6 damage (save vs wands for half).

- id: wand_enemy_detection
  item_type: magic
  name: Wand of Enemy Detection
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "2d10"
  description: |-
    Expending a charge causes enemies within 60' to be haloed in a fiery
    glow. Even concealed or invisible enemies are affected.

- id: wand_fear
  item_type: magic
  name: Wand of Fear
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "2d10"
  description: |-
    Conjures a cone of magical energy 60' long and 30' wide at the far end.
    Creatures in the cone flee from the wielder at maximum speed for 30
    rounds (save vs wands negates).

- id: wand_fire_balls
  item_type: magic
  name: Wand of Fire Balls
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "2d10"
  description: |-
    Conjures fire balls. A streak of flame shoots to an area up to 240'
    distant, detonating in a 40' diameter sphere of fire. Creatures caught
    suffer 6d6 damage (save vs wands for half).

- id: wand_illusion
  item_type: magic
  name: Wand of Illusion
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "2d10"
  description: |-
    Manifests an illusion of the character's choosing (as the magic-user
    spell phantasmal force). Concentration required to maintain the illusion;
    the wielder may move at up to half speed. Concentration breaks if the
    wielder attacks, casts a spell, or is successfully attacked.

- id: wand_lightning_bolts
  item_type: magic
  name: Wand of Lightning Bolts
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "2d10"
  description: |-
    Conjures a lightning bolt: point of origin up to 180' distant; bolt is
    60' long and 5' wide. Creatures struck suffer 6d6 damage (save vs wands
    for half). If the bolt hits a solid barrier before its full length, it
    bounces back towards the wielder for the remaining distance.

- id: wand_magic_detection
  item_type: magic
  name: Wand of Magic Detection
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "2d10"
  description: |-
    Expending a charge causes magic items within 20' to be haloed with light.
    Concealed items also glow, but the light might not be visible.

- id: wand_magic_missiles
  item_type: magic
  name: Wand of Magic Missiles
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "2d10"
  description: |-
    Shoots magic missiles that hit unerringly. Each charge conjures a missile
    that hits a foe within 150', inflicting 1d6+1 damage. Up to 2 charges
    may be expended in a single round.

- id: wand_metal_detection
  item_type: magic
  name: Wand of Metal Detection
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "2d10"
  description: |-
    Expending a charge causes the wand to point towards metal within 20'.
    The type of metal is revealed. Only masses of at least 1,000 coins in
    weight are detected.

- id: wand_negation
  item_type: magic
  name: Wand of Negation
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "2d10"
  description: |-
    Negates the effects of another wand or staff for one round. The wielder
    must declare intent before rolling initiative and target a specific wand
    or staff.

- id: wand_paralysation
  item_type: magic
  name: Wand of Paralysation
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "2d10"
  description: |-
    Conjures a cone of paralysing energy 60' long and 30' wide at the far
    end. Creatures in the cone are paralysed for 6 turns (save vs wands
    negates).

- id: wand_polymorph
  item_type: magic
  name: Wand of Polymorph
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "2d10"
  description: |-
    The wielder or another creature within 60' transforms into another type
    of creature (as the magic-user spells polymorph self and polymorph
    others). An unwilling subject may save vs wands to negate.

- id: wand_radiance
  item_type: magic
  name: Wand of Radiance
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "2d10"
  description: |-
    Three light-bringing effects: Light (1 charge): 15' radius light, 6
    turns, from a location within 120'. Continual light (2 charges):
    permanent 30' radius light from a location within 120'. Burst of
    sunlight (3 charges): momentary flash within 120'; undead within 40'
    suffer 6d6 damage; viewers must save vs wands or be blinded for 1 round.

- id: wand_secret_door_detection
  item_type: magic
  name: Wand of Secret Door Detection
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "2d10"
  description: |-
    Reveals the location of any secret door within 20'.

- id: wand_summoning
  item_type: magic
  name: Wand of Summoning
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "2d10"
  description: |-
    Summons monsters to do the character's bidding. 1st level monsters:
    1 charge summons 2d4. 2nd level: 2 charges summon 1d6. 3rd level:
    3 charges summon 1d4. Type determined randomly (e.g. wandering monster
    tables). Arrive in 1d4 rounds; attack enemies as directed or follow
    commands if a language is shared. Disappear after 1 round per character
    level.

- id: wand_trap_detection
  item_type: magic
  name: Wand of Trap Detection
  category: magic_rods_staves_wands
  cost_gp: 0
  magic: true
  equippable: false
  charge_dice: "2d10"
  description: |-
    Reveals the location of all traps within 20'.

# ─── Potions ──────────────────────────────────────────────────────────────────

- id: potion_clairaudience
  item_type: magic
  name: Potion of Clairaudience
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    Enables the character to hear through the ears of another creature.
    Range: The other creature must be within 60'.
    Obstructions: Lead blocks the effect.
    Duration: 1d6+6 turns.

- id: potion_clairvoyance
  item_type: magic
  name: Potion of Clairvoyance
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    Enables the character to see through the eyes of another creature.
    Range: The other creature must be within 60'.
    Obstructions: Lead blocks the effect.
    Duration: 1d6+6 turns.

- id: potion_control_animal
  item_type: magic
  name: Potion of Control Animal
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    Allows the character to control the actions of normal or giant (but not
    magical) animals. Affects up to 3d6 Hit Dice. Concentration required;
    only creatures in visual range can be controlled. When the effect ends,
    affected animals move away. Duration: 1d6+6 turns.

- id: potion_control_dragon
  item_type: magic
  name: Potion of Control Dragon
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    Allows the character to control 1–3 dragons of a specific type (chosen by
    the referee). Spell casting cannot be commanded. When the effect ends,
    affected dragons have a hostile reaction. Duration: 1d6+6 turns.

- id: potion_control_giant
  item_type: magic
  name: Potion of Control Giant
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    Allows the character to control 1–4 giants of a specific type (chosen by
    the referee). Duration: 1d6+6 turns.

- id: potion_control_human
  item_type: magic
  name: Potion of Control Human
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    A charm may be placed upon a human within 60'. One target may be charmed
    per round. The subject may save vs spells to resist. Up to 6 Hit Dice of
    humans may be charmed; normal humans count as ½ HD. Charmed individuals
    regard the character as a trusted friend and obey commands, as long as
    these are not obviously harmful or against their alignment.
    Duration: 1d6+6 turns.

- id: potion_control_plant
  item_type: magic
  name: Potion of Control Plant
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    Affects all plants (including plant monsters) in a 30' square area up to
    60' distant. Affected plants may be commanded to move around and can be
    used to entangle creatures in the area. Duration: 1d6+6 turns.

- id: potion_control_undead
  item_type: magic
  name: Potion of Control Undead
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    Allows the character to control up to 3d6 Hit Dice of undead. When the
    effect ends, affected undead have a hostile reaction.
    Duration: 1d6+6 turns.

- id: potion_delusion
  item_type: magic
  name: Potion of Delusion
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    A character who drinks this potion believes they are under the effects of
    another type of potion (determined by the referee). The referee should
    try to trick the player into believing the character is under the other
    potion's effect, only revealing the truth at some vital juncture.

- id: potion_diminution
  item_type: magic
  name: Potion of Diminution
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    The character shrinks to 6" high. While shrunk: unable to harm creatures
    larger than 1' tall; can slip through narrow spaces; only 10% chance of
    being spotted while motionless. Duration: 1d6+6 turns.

- id: potion_esp
  item_type: magic
  name: Potion of ESP
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    Grants the power of reading thoughts. Works as the magic-user spell ESP.
    Duration: 1d6+6 turns.

- id: potion_fire_resistance
  item_type: magic
  name: Potion of Fire Resistance
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    Grants protection against fire. Unharmed by non-magical heat or fire.
    +2 bonus to saving throws vs fire-based magical or breath attacks.
    Fire-based damage reduced by 1 per die (minimum 1 per die).
    Duration: 1d6+6 turns.

- id: potion_flying
  item_type: magic
  name: Potion of Flying
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    Grants the ability to fly through the air at up to 360' (120'). Free
    movement in any direction, including levitation and hovering.
    Duration: 1d6+6 turns.

- id: potion_gaseous_form
  item_type: magic
  name: Potion of Gaseous Form
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    The character's body becomes a cloud of vapour. Equipment and clothing
    drops to the floor. The character may move as gas through small cracks in
    stone walls, wooden objects, etc. Attacking is not possible. AC is -2
    [21]; non-magical weapons cannot harm the character.
    Duration: 1d6+6 turns.

- id: potion_giant_strength
  item_type: magic
  name: Potion of Giant Strength
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    Grants the strength of a frost giant. Attacks with weapons inflict double
    damage. The character may throw boulders for 3d6 damage (range up to
    200'). Not cumulative with other magic items augmenting strength.
    Duration: 1d6+6 turns.

- id: potion_growth
  item_type: magic
  name: Potion of Growth
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    The character doubles in size. Their increased strength means melee
    attacks deal double damage. Duration: 1d6+6 turns.

- id: potion_healing
  item_type: magic
  name: Potion of Healing
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    Has one of two effects on the character who drinks it:
    1. Healing a living subject: Restores 1d6+1 hit points of damage. This
       cannot grant more hit points than the subject's normal maximum.
    2. Curing paralysis: Paralysing effects are negated.

- id: potion_heroism
  item_type: magic
  name: Potion of Heroism
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    Normal humans and combat-focused, non-magic-using class characters
    temporarily gain additional levels. Normal human: gain 4th level fighter
    abilities. 1st–3rd level: gain 3 levels. 4th–7th level: gain 2 levels.
    8th–10th level: gain 1 level. 11th+: no effect. All abilities of the
    additional levels are gained, including extra hit points. Damage suffered
    is first deducted from the pool of additional hit points.
    Duration: 1d6+6 turns.

- id: potion_invisibility
  item_type: magic
  name: Potion of Invisibility
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    The character becomes invisible, as the magic-user spell invisibility.
    At the referee's discretion, may be consumed in six smaller doses with
    reduced duration. Duration: 1d6+6 turns.

- id: potion_invulnerability
  item_type: magic
  name: Potion of Invulnerability
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    Magically protects the character from harm. +2 AC bonus; +2 bonus to all
    saving throws. If more than one is consumed in a week, the effects invert
    (-2 to AC and saves). Duration: 1d6+6 turns.

- id: potion_levitation
  item_type: magic
  name: Potion of Levitation
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    The character gains the ability to move up and down through the air at
    will. Vertical: mentally directed at up to 60' per round. Horizontal:
    the character can push against solid objects to move laterally. A normal
    amount of weight can be carried. Duration: 1d6+6 turns.

- id: potion_longevity
  item_type: magic
  name: Potion of Longevity
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    Instantly and permanently causes the character to become 10 years younger.

- id: potion_poison
  item_type: magic
  name: Potion of Poison
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    Appears the same as any other potion. Effect: causes death (save vs
    poison). Even a sip has the full effect.

- id: potion_polymorph_self
  item_type: magic
  name: Potion of Polymorph Self
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    The character transforms into another being of their choice, as the
    magic-user spell polymorph self. Duration: 1d6+6 turns.

- id: potion_speed
  item_type: magic
  name: Potion of Speed
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    The character's movements and actions are magically accelerated.
    Movement rate is doubled. Attacks per round are doubled. Other actions
    may be performed at double speed. Duration: 1d6+6 turns.

- id: potion_treasure_finding
  item_type: magic
  name: Potion of Treasure Finding
  category: magic_potions
  cost_gp: 0
  magic: true
  equippable: false
  description: |-
    Grants the ability to sense treasure up to 360' away. The character
    gains awareness of the direction and distance of treasure. Concentration
    required. The largest treasure hoard within range is sensed. Lead blocks
    the magic. Duration: 1d6+6 turns.
