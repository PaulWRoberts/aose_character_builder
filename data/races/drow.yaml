id: drow
name: Drow
source: ose_advanced_fantasy
ability_requirements:
  INT: 9
ability_modifiers:
  CON: -1
  DEX: 1
infravision: 90
languages:
- common
- deepcommon
- elvish
- gnomish
allowed_classes:
- acrobat
- assassin
- cleric
- fighter
- knight
- magic_user
- ranger
- thief
class_level_caps:
  acrobat: 10
  assassin: 10
  cleric: 11
  fighter: 7
  knight: 9
  magic_user: 9
  ranger: 9
  thief: 11
features:
- id: ability_modifiers
  name: Ability Modifiers
  text: –1 CON, +1 DEX.
- id: npc_only_classes_referee_option
  name: NPC-Only Classes (Referee Option)
  text: At the referee’s option, drow clerics may only exist as NPCs.
  mechanical:
    referee_option: true
    npc_only_classes:
    - cleric
- id: detect_secret_doors
  name: Detect Secret Doors
  text: When actively searching, detect hidden and secret doors with a 2-in-6 chance.
  mechanical:
    chance_in_6: 2
    condition: actively_searching
- id: immunity_to_ghoul_paralysis
  name: Immunity to Ghoul Paralysis
  text: Completely unaffected by the paralysis ghouls can inflict.
  mechanical:
    immunities:
    - ghoul_paralysis
- id: innate_magic
  name: Innate Magic
  text: At 2nd level, may cast darkness, the reverse of light, once per day. At 4th level, may cast detect magic once per day.
  mechanical:
    spells:
    - spell: darkness
      level_available: 2
      frequency: once_per_day
      notes: reverse_of_light
    - spell: detect_magic
      level_available: 4
      frequency: once_per_day
- id: light_sensitivity
  name: Light Sensitivity
  text: In bright light, including daylight or continual light, suffers a –2 penalty to attack rolls and a –1 penalty to Armour Class.
  mechanical:
    conditions:
    - bright_light
    - daylight
    - continual_light
    attack_roll_modifier: -2
    armour_class_modifier: -1
  granted_modifiers:
  - {target: "ac", op: add, value: -1, condition: bright_light}
  - {target: "attack", op: add, value: -2, condition: bright_light}
- id: listening_at_doors
  name: Listening at Doors
  text: Has a 2-in-6 chance of hearing noises at doors.
  mechanical:
    chance_in_6: 2
