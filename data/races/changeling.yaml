- id: shape_stealing
  name: Shape-Stealing
  text: |-
    A changeling can alter their form to exactly mimic another person, requiring 1 round of physical contact. The form of a slain (within the last turn) or unconscious victim can be stolen; from 5th level, a conscious victim's form can be stolen with a successful melee attack (the victim may save versus spells to resist).

    The changeling remains in the new form for up to one turn per level, retaining their own intelligence, hit points, saving throws, and attack probabilities, but gaining the new form's physical capabilities (not its non-physical special abilities). Worn or carried items are copied without magical properties and vanish if dropped.
