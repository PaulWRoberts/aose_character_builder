id: duergar
name: Duergar
source: ose_advanced_fantasy
ability_requirements:
  CON: 9
  INT: 9
ability_modifiers:
  CHA: -1
  CON: 1
infravision: 90
languages:
- common
- deepcommon
- dwarvish
- gnomish
- goblin
- kobold
allowed_classes:
- assassin
- cleric
- fighter
- thief
class_level_caps:
  assassin: 9
  cleric: 8
  fighter: 9
  thief: 9
features:
- id: ability_modifiers
  name: Ability Modifiers
  text: –1 CHA, +1 CON.
- id: npc_only_classes_referee_option
  name: NPC-Only Classes (Referee Option)
  text: At the referee’s option, duergar clerics may only exist as NPCs.
  mechanical:
    referee_option: true
    npc_only_classes:
    - cleric
- id: combat
  name: Combat
  text: Due to short height, can only use small or normal sized weapons. Cannot use longbows or two-handed swords.
  mechanical:
    weapon_size_restriction:
    - small
    - normal
    prohibited_weapons:
    - longbow
    - two_handed_sword
- id: detect_construction_tricks
  name: Detect Construction Tricks
  text: When searching, has a 2-in-6 chance to detect new construction, sliding walls, or sloping passages.
  mechanical:
    chance_in_6: 2
    condition: searching
- id: detect_room_traps
  name: Detect Room Traps
  text: When searching, has a 2-in-6 chance of detecting non-magical room traps.
  mechanical:
    chance_in_6: 2
    condition: searching
    trap_type: non_magical_room_traps
- id: light_sensitivity
  name: Light Sensitivity
  text: In bright light, including daylight or continual light, suffers a –2 penalty to attack rolls and a –1 penalty to Armour Class.
  mechanical:
    conditions:
    - bright_light
    - daylight
    - continual_light
    attack_roll_modifier: -2
    armour_class_modifier: -1
- id: listening_at_doors
  name: Listening at Doors
  text: Has a 2-in-6 chance of hearing noises at doors.
  mechanical:
    chance_in_6: 2
- id: resilience
  name: Resilience
  text: 'Natural constitution and resistance to magic grants a bonus to saving throws versus paralysis, poison, spells, and magic wands, rods, and staves based on CON score: 6 or lower +0; 7–10 +2; 11–14 +3; 15–17 +4; 18 +5.'
  mechanical:
    save_categories:
    - paralysis
    - poison
    - spells
    - magic_wands_rods_staves
    bonus_by_CON:
      6_or_lower: 0
      '7_10': 2
      '11_14': 3
      '15_17': 4
      '18': 5
  granted_modifiers:
  - target: save:death
    op: add
    scale:
      by: ability:CON
      table:
        7: 2
        11: 3
        15: 4
        18: 5
  - target: save:spells
    op: add
    scale:
      by: ability:CON
      table:
        7: 2
        11: 3
        15: 4
        18: 5
  - target: save:wands
    op: add
    scale:
      by: ability:CON
      table:
        7: 2
        11: 3
        15: 4
        18: 5
  - target: save:paralysis
    op: add
    scale:
      by: ability:CON
      table:
        7: 2
        11: 3
        15: 4
        18: 5
- id: stealth
  name: Stealth
  text: Underground, has a 3-in-6 chance of moving silently.
  mechanical:
    chance_in_6: 3
    condition: underground
    activity: moving_silently
