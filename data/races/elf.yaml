    referee_option: true
    npc_only_classes:
    - cleric
    - druid
- id: detect_secret_doors
  name: Detect Secret Doors
  text: When actively searching, detect hidden and secret doors with a 2-in-6 chance.
  mechanical:
    chance_in_6: 2
    condition: actively_searching
- id: immunity_to_ghoul_paralysis
  name: Immunity to Ghoul Paralysis
  text: Completely unaffected by the paralysis ghouls can inflict.
  mechanical:
    immunities:
    - ghoul_paralysis
- id: listening_at_doors
  name: Listening at Doors
  text: Has a 2-in-6 chance of hearing noises at doors.
  mechanical:
    chance_in_6: 2
