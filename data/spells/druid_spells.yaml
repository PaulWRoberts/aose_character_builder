- id: faerie_fire
  name: Faerie Fire
  level: 1
  spell_lists: [druid]
  source: ose-advanced
  range: "60'"
  duration: 1 turn
  description: >-
    Selected objects or creatures in range are outlined with a lambent green
    fire. Harmless in itself, the glow counters invisibility and concealment
    and makes the targets easier to strike. The number/size of targets grows
    with caster level.
- id: entangle
  name: Entangle
  level: 1
  spell_lists: [druid]
  source: ose-advanced
  range: "80'"
  duration: 1 turn
  description: >-
    All plants in a 20' radius within range twist and entangle creatures in the
    area. A creature that fails a save versus spells cannot move; one that
    succeeds moves through at half rate.
- id: predict_weather
  name: Predict Weather
  level: 1
  spell_lists: [druid]
  source: ose-advanced
  range: 1 mile diameter per level
  duration: instant
  description: >-
    The caster gains accurate knowledge of the weather within range over the
    next 12 hours.
