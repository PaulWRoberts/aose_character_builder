- id: read_magic
  name: Read Magic
  level: 1
  spell_lists: [magic_user]
  source: ose-advanced
  range: The caster
  duration: 1 turn
  description: >-
    The caster can decipher magical inscriptions or runes: the script of an
    arcane scroll (which may then be activated later), another caster's spell
    book, or runes inscribed on an object. Once read, that particular writing
    can thereafter be read without the spell.
- id: detect_magic
  name: Detect Magic
  level: 1
  spell_lists: [magic_user]
  source: ose-advanced
  range: "60'"
  duration: 2 turns
  description: >-
    Enchanted objects, areas, or creatures are caused to glow. Both permanent
    and temporary enchantments are revealed.
- id: magic_missile
  name: Magic Missile
  level: 1
  spell_lists: [magic_user]
  source: ose-advanced
  range: "150'"
  duration: 1 turn
  description: >-
    Conjures a glowing dart of energy that strikes a visible target unerringly
    (no attack roll or save) for 1d6+1 damage. Two additional missiles are
    conjured per five levels of the caster (three missiles at 6th-10th, five at
    11th-15th, etc.); multiple missiles may target one creature.
- id: sleep
  name: Sleep
  level: 1
  spell_lists: [magic_user]
  source: ose-advanced
  range: "240'"
  duration: 4d4 turns
  description: >-
    Causes a magical slumber (the undead are immune). Targets either a single
    creature of 4+1 HD, or a total of 2d8 HD of creatures of 4 HD or less each
    (weakest first; excess rolled HD is wasted).
- id: charm_person
  name: Charm Person
  level: 1
  spell_lists: [magic_user]
  source: ose-advanced
  range: "120'"
  duration: One or more days
  description: >-
    A single human, demihuman, or human-like monster of up to 4+1 HD must save
    versus spells or regard the caster as a trusted friend and ally, obeying
    commands they share a language for (never suicidal or clearly harmful ones).
    Undead and human-like monsters above 4+1 HD are unaffected.
