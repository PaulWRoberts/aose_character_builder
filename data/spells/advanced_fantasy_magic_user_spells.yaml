- id: magic_user_charm_person
  name: Charm Person
  level: 1
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 120'
  duration: One or more days (see below)
  description: |-
    A single human, demihuman, or human-like monster must save versus spells or be charmed, as follows:

    ▶ Friendship: The subject regards the caster as its trusted friend and ally and will come to the caster's defence.

    ▶ Commands: If they share a language, the caster may give the charmed creature commands, which it will obey.

    ▶ Subject's nature: Commands that contradict the charmed creature's habits or alignment may be ignored.

    ▶ Suicidal commands: An affected creature never obeys suicidal or obviously harmful orders.

    Restrictions: Human-like monsters of greater than 4+1 HD and undead are not affected.

    Duration: The charm lasts indefinitely, but the subject is allowed to make further saves versus spells at intervals, depending on its INT score. If one of these saves succeeds, the spell ends.

    ▶ INT 3–8: The creature gains a new save once every month.

    ▶ INT 9–12: The creature gains a new save each week.

    ▶ INT 13–18: The creature gains a new save once every day.
- id: magic_user_detect_magic
  name: Detect Magic
  level: 1
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 60'
  duration: 2 turns
  description: |-
    Enchanted objects, areas, or creatures are caused to glow. Both permanent and temporary enchantments are revealed.
- id: magic_user_floating_disc
  name: Floating Disc
  level: 1
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 6'
  duration: 6 turns
  description: |-
    The caster conjures a slightly concave, circular disc of magical force that follows them about and carries loads.

    ▶ Dimensions: The disc is 3 feet in diameter and 1 inch deep at its centre.

    ▶ Load: It can hold a maximum load of 5,000 coins (500 pounds).

    ▶ Motion: The disc floats at waist height and remains level, floating along horizontally within spell range.

    ▶ End: When the disc winks out at the end of the spell's duration, anything it was supporting is dropped.
- id: magic_user_hold_portal
  name: Hold Portal
  level: 1
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 10'
  duration: 2d6 turns
  description: |-
    This spell magically holds shut a door, gate, window, or other kind of portal.

    ▶ Opening by magic: A knock spell opens the held portal instantly.

    ▶ Opening by force: Creatures with at least 3 Hit Dice more than the caster can open the held portal with one round of effort.
- id: magic_user_light
  name: Light
  level: 1
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 120'
  duration: 6 turns +1 per level
  description: |-
    This spell has three usages:

    1. Conjuring light: In a 15' radius. The magical light is sufficient for reading, but is not as bright as daylight. The spell may be cast upon an object, in which case the light moves with the object.
    2. Blinding a creature: By casting the spell upon its eyes. If the target fails a saving throw versus spells, it is blinded for the duration. A blind creature cannot attack.
    3. Cancelling darkness: Light may cancel a darkness spell (see below).

    Reversed: Darkness

    Creates a 15' radius area of magical blackness, preventing normal sight (but not infravision). Like light, it may alternatively be used to blind creatures or to dispel a light spell.
  reversible: true
  reverse_name: Darkness
- id: magic_user_magic_missile
  name: Magic Missile
  level: 1
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 150'
  duration: 1 turn
  description: |-
    This spell conjures a glowing dart of energy that the caster may choose to shoot at a visible target within range.

    ▶ Hit: The missile hits unerringly (no attack roll or saving throw is required).

    ▶ Damage: The missile inflicts 1d6+1 damage.

    ▶ Higher level casters: May conjure more missiles: two additional missiles are conjured per five experience levels the caster has gained (i.e. three missiles at 6th–10th level, five missiles at 11th–15th level, etc.). Multiple missiles may be directed at a single target.
- id: magic_user_protection_from_evil
  name: Protection from Evil
  level: 1
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: The caster
  duration: 6 turns
  description: |-
    This spell wards the caster from attacks by creatures of another alignment, as follows:

    ▶ Bonuses: The caster gains a +1 bonus to saving throws against attacks or special abilities of affected creatures.

    ▶ Affected creatures' attacks: Against the caster are penalised by –1.

    ▶ Enchanted, constructed, or summoned creatures: The spell additionally prevents such creatures from attacking the caster in melee, though they may still make ranged attacks. If the caster engages such a creature in melee, this protection is broken (the caster still gains the save and attack bonuses mentioned above).
- id: magic_user_read_languages
  name: Read Languages
  level: 1
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: The caster
  duration: 2 turns
  description: |-
    For the duration of this spell, the caster may read any language, coded message, map, or other set of written instructions. This spell does not grant any ability to speak unknown languages.
- id: magic_user_read_magic
  name: Read Magic
  level: 1
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: The caster
  duration: 1 turn
  description: |-
    By means of read magic, the caster can decipher magical inscriptions or runes, as follows:

    ▶ Scrolls: The magical script of a scroll of arcane spells can be understood. The caster is then able to activate the scroll at any time in the future.

    ▶ Spell books: A spell book written by another arcane spell caster can be deciphered.

    ▶ Inscriptions: Runes or magical words inscribed on an object or surface can be understood.

    ▶ Reading again: Once the caster has read a magical inscription using read magic, they are thereafter able to read that particular writing without recourse to the use of this spell.
- id: magic_user_shield
  name: Shield
  level: 1
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: The caster
  duration: 2 turns
  description: |-
    Shield creates an invisible field of force that protects the caster:

    ▶ Against missile attacks: The caster's AC is 2 [17].

    ▶ Against other attacks: The caster's AC is 4 [15].
- id: magic_user_sleep
  name: Sleep
  level: 1
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 240'
  duration: 4d4 turns
  description: |-
    A sleep spell causes a magical slumber to come upon creatures, excluding the undead. The spell may target either:

    1. A single creature with 4+1 Hit Dice.
    2. A total of 2d8 Hit Dice of creatures of 4 HD or lower each.

    When targeting creatures of 4 HD or less, the following rules apply:

    ▶ Weakest first: Targets with the least HD are affected first.

    ▶ HD: Calculate monsters with less than 1 HD as having 1 HD and monsters with a bonus to HD as having the flat amount. (For example, a 3+2 HD monster would be calculated as having 3 HD.)

    ▶ Excess: Rolled Hit Dice that are not sufficient to affect a creature are wasted.

    Killing: Creatures enchanted by this spell are helpless and can be killed instantly with a bladed weapon.

    Awakening: Slapping or wounding awakens an affected creature.
- id: magic_user_ventriloquism
  name: Ventriloquism
  level: 1
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 60'
  duration: 2 turns
  description: |-
    The caster may make their voice appear to come from any location or source (e.g. a statue or animal) within range.
- id: magic_user_continual_light
  name: Continual Light
  level: 2
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 120'
  duration: permanent
  description: |-
    This spell has three usages:

    1. Conjuring light: In a 30' radius. The magical light is sufficient for reading, but is not as bright as daylight. The spell may be cast upon an object, in which case the light moves with the object.
    2. Blinding a creature: By casting the spell upon its eyes. If the target fails a saving throw versus spells, it is blinded. A blind creature cannot attack.
    3. Cancelling darkness: Continual light may cancel a continual darkness spell (see below).

    Reversed: Continual Darkness

    Creates a 30' radius area of magical blackness, preventing both normal sight and infravision. Light sources brought within the area of darkness do not illuminate it. Like continual light, it may alternatively be used to blind creatures or to dispel a continual light spell.
  reversible: true
  reverse_name: Continual Darkness
- id: magic_user_detect_evil
  name: Detect Evil
  level: 2
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 60'
  duration: 2 turns
  description: |-
    Objects enchanted for evil purposes or living beings with evil intentions are caused to magically glow.

    ▶ Intent only: This spell does not grant the ability to read minds, but only grants a general sense of evil intent.

    ▶ Definition of evil: The referee must decide what is “evil”. Some things that are potentially harmful, like traps, are not “evil.”
- id: magic_user_detect_invisible
  name: Detect Invisible
  level: 2
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 10' per level
  duration: 6 turns
  description: |-
    Invisible creatures or items in range are revealed to the caster.
- id: magic_user_esp
  name: ESP
  level: 2
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 60'
  duration: 12 turns
  description: |-
    This spell grants the caster the ability to perceive and understand the thoughts of other living creatures.

    ▶ Focus for 1 turn: To pick up thoughts, the caster must focus their concentration in one direction for one turn.

    ▶ After this turn: The thoughts of all creatures within range in that direction can be perceived.

    ▶ Multiple creatures: If multiple creatures are within the range in the direction being focused on, their thoughts mingle into a confusing jumble. The caster must spend an additional turn to sort out one creature's thoughts.

    ▶ Meaning: The caster understands the meaning of all thoughts even if they do not share the creature's language.

    ▶ Obstructions: The ability to perceive thoughts is obstructed by a thin layer of lead or by rock of 2' thick or greater.
- id: magic_user_invisibility
  name: Invisibility
  level: 2
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 240'
  duration: Permanent (but may be broken, see below)
  description: |-
    The caster or another creature or object within range becomes invisible:

    ▶ If cast on a creature: Any gear the subject is carrying is also rendered invisible (this includes clothing and armour). Items dropped or put down by an invisible creature become visible. If the subject attacks or casts a spell, the invisibility is broken, ending the spell.

    ▶ If cast on an object: The invisibility is permanent.

    ▶ Light sources: If a light source is made invisible (either as part of a creature's gear or as an individual object), the light it casts is unaffected.
- id: magic_user_knock
  name: Knock
  level: 2
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 60'
  duration: 1 round
  description: |-
    The knock spell opens stuck, barred, or locked doors, gates, chests, and so forth.

    ▶ Magically held doors: Are affected (e.g. hold portal, wizard lock).

    ▶ Secret doors: May be opened, but they must be known to the caster.
- id: magic_user_levitate
  name: Levitate
  level: 2
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: The caster
  duration: 6 turns +1 per level
  description: |-
    This enchantment allows the caster to move up and down through the air:

    ▶ Vertical: The caster mentally directs vertical movement at up to 20' per round.

    ▶ Horizontal: The caster can push against solid objects to move laterally.

    ▶ Weight: A normal amount of weight can be carried while levitating.
- id: magic_user_locate_object
  name: Locate Object
  level: 2
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 60' +10' per level
  duration: 2 turns
  description: |-
    The caster can sense the direction (but not distance) of an object. One of two types of objects may be located:

    1. General class: An object of a general class (e.g. a stairway, an altar, etc.). In this case, the nearest object of that type is located.
    2. Specific object: A specific object known to the caster.

    Restrictions: This spell cannot be used to locate creatures.
- id: magic_user_mirror_image
  name: Mirror Image
  level: 2
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: The caster
  duration: 6 turns
  description: |-
    1d4 illusory duplicates of the caster appear.

    ▶ Behaviour: The mirror images look and behave exactly as the caster.

    ▶ Attacks on the caster: Destroy one of the mirror images (even if the attack misses).
- id: magic_user_phantasmal_force
  name: Phantasmal Force
  level: 2
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 240'
  duration: Concentration
  description: |-
    A visual illusion of the caster's choosing manifests in a 20' cube area. Three types of illusions may be created:

    1. An illusionary monster: That can be directed to attack. The monster has an Armour Class of 9 [10] and will vanish if hit in combat.
    2. An illusionary attack: For example, an avalanche, a falling ceiling, a magic missile, etc. Targets who save versus spells are unaffected.
    3. A scene: Either changing the appearance of the affected area or creating the appearance of something new. The scene disappears if touched.

    Stipulations: The following apply:

    ▶ Concentration: Is required to maintain the illusion. If the caster moves or loses concentration, the spell ends.

    ▶ Illusionary monsters or attacks: May appear to be harmful but no real damage is ever inflicted. A character who appears to die actually falls unconscious, a character turned to stone will actually be paralysed, and so on. Such effects last for 1d4 turns.

    ▶ Illusions from imagination: If the illusion is of something the caster has not personally seen, the referee should grant targets a bonus to any applicable saving throws.
- id: magic_user_web
  name: Web
  level: 2
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 10'
  duration: 48 turns
  description: |-
    Web conjures a many-layered mass of strong, sticky threads, blocking a 10' cube area.

    ▶ Entanglement: Creatures caught within a web become entangled among the gluey fibres. Entangled creatures can't move, but can break free depending on their strength (see below).

    ▶ Flammable: The strands of the web are flammable and can be destroyed by fire in two rounds. All creatures caught within flaming webs suffer 1d6 points of damage from the flames.

    Breaking free: Depends on STR:

    ▶ Normal human range: The creature can break free in 2d4 turns.

    ▶ Magically augmented STR above 18: The creature can break free in 4 rounds.

    ▶ Giant strength: The creature can break free in two rounds.
- id: magic_user_wizard_lock
  name: Wizard Lock
  level: 2
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 10'
  duration: permanent
  description: |-
    A wizard lock spell magically locks a door, gate, similar portal, or any item that has a lock.

    Bypassing: The magical lock is permanent but may be bypassed as follows:

    ▶ The caster: Can freely pass their own wizard lock.

    ▶ A knock spell: Allows passage.

    ▶ Higher level casters: Any magic-using character who is at least 3 levels higher than the caster of the wizard lock may pass through unimpeded.

    Temporary: Bypassing does not destroy a wizard lock.
- id: magic_user_clairvoyance
  name: Clairvoyance
  level: 3
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 60'
  duration: 12 turns
  description: |-
    The caster gains the ability to see through the eyes of other living creatures.

    ▶ Focus for 1 turn: To establish a connection with a creature, the caster must focus their concentration in one particular direction for one turn.

    ▶ After this turn: The visual perceptions of one creature within range in that direction are relayed to the caster.

    ▶ Switching: Once a connection is established, the caster may choose to maintain it or to change to another subject.

    ▶ Obstructions: The spell is blocked by a thin layer of lead or by rock of 2' thick or greater.
- id: magic_user_dispel_magic
  name: Dispel Magic
  level: 3
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 120'
  duration: instant
  description: |-
    Dispel magic ends spells of non-instantaneous duration within a 20' cube area.

    ▶ Caster levels: If the level of the caster of the effect to be dispelled is higher than the level of the caster of dispel magic, there is a 5% chance per level difference that the attempt to dispel will fail.

    ▶ Magic items: Are unaffected.
- id: magic_user_fire_ball
  name: Fire Ball
  level: 3
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 240'
  duration: instant
  description: |-
    Flame streaks towards a point within range and detonates in a 20' radius sphere.

    ▶ Damage: Creatures caught in the fire ball suffer 1d6 damage per level of the caster, with a successful save versus spells indicating half damage.
- id: magic_user_fly
  name: Fly
  level: 3
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: The caster or a creature touched
  duration: 1d6 turns +1 per level
  description: |-
    The subject gains the ability to fly through the air.

    ▶ Movement rate: Up to 360' (120').

    ▶ Free movement: Is possible in any direction, including the ability to levitate and to hover in mid-air.
- id: magic_user_haste
  name: Haste
  level: 3
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 240'
  duration: 3 turns
  description: |-
    Up to 24 creatures in a 60' diameter area are enchanted to be able to move and act twice as quickly as normal:

    ▶ Movement: Subjects' maximum movement rates are doubled.

    ▶ Attacks: Subjects may make double the normal number of attacks per round.

    ▶ Spells: The number of spells a subject may cast per round is not doubled.

    ▶ Magical devices: The use of devices such as wands is also not doubled.
- id: magic_user_hold_person
  name: Hold Person
  level: 3
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 120'
  duration: 1 turn per level
  description: |-
    This spell causes one or more humans, demihumans, or human-like monsters to be paralysed if they fail a saving throw versus spells. It may be cast in two ways:

    1. Against an individual: The target's saving throw is penalised by –2.
    2. Against a group: 1d4 individuals in the group are targeted.

    Restrictions: Human-like monsters of greater than 4+1 HD and undead are not affected.
- id: magic_user_infravision
  name: Infravision
  level: 3
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: The caster or a creature touched
  duration: 1 day
  description: |-
    The subject is able to see 60' in the dark with infravision.
- id: magic_user_invisibility_10_radius
  name: Invisibility 10' Radius
  level: 3
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 120'
  duration: Permanent (but may be broken, see below)
  description: |-
    A selected creature and all creatures within 10' of it become invisible:

    ▶ Area: The 10' radius area of the spell's effect moves with the chosen creature.

    ▶ Exiting the area: Subjects that move more than 10' away from the chosen creature become visible.

    ▶ Entering the area: Creatures that move into the area after the spell is cast do not become invisible.

    ▶ Gear: Any gear a subject is carrying is also rendered invisible. Items dropped or put down by an invisible creature become visible. Carried light sources become invisible but the emitted light does not.

    ▶ Breaking the invisibility: If a subject attacks or casts a spell, the invisibility is broken for that subject.
- id: magic_user_lightning_bolt
  name: Lightning Bolt
  level: 3
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 180'
  duration: instant
  description: |-
    A powerful stroke of electrical energy, 60' long and 5' wide, is conjured.

    ▶ Damage: Creatures caught in the lightning bolt suffer 1d6 damage per level of the caster, with a successful save versus spells indicating half damage.

    ▶ Bouncing: If the lightning bolt hits a solid barrier before its full length is reached, it is reflected and travels for any remaining distance of its full length in the direction of the caster.
- id: magic_user_protection_from_evil_10_radius
  name: Protection from Evil 10' Radius
  level: 3
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 10' around the caster
  duration: 12 turns
  description: |-
    This spell wards the caster and all allies within 10' from attacks by creatures of another alignment, as follows:

    ▶ Bonuses: Those warded gain a +1 bonus to saving throws against attacks or special abilities of affected creatures.

    ▶ Affected creatures' attacks: Against those warded are penalised by –1.

    ▶ Enchanted, constructed, or summoned creatures: The spell additionally prevents such creatures from making melee attacks against those warded, though they may still make ranged attacks. If any of the warded party engages such a creature in melee, this protection is broken (those warded still gain the save and attack bonuses mentioned above).
- id: magic_user_protection_from_normal_missiles
  name: Protection from Normal Missiles
  level: 3
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 30'
  duration: 12 turns
  description: |-
    A single subject in range gains complete immunity to small, non-magical missiles (e.g. no protection is granted against hurled boulders or enchanted arrows).
- id: magic_user_water_breathing
  name: Water Breathing
  level: 3
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 30'
  duration: 1 day
  description: |-
    The subject can breathe water freely by means of this spell.

    ▶ Breathing air: The spell does not affect the subject's ability to breathe air.

    ▶ Swimming: No additional proficiency at swimming is granted.
- id: magic_user_charm_monster
  name: Charm Monster
  level: 4
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 120'
  duration: One or more days (see below)
  description: |-
    This spell places a charm upon either 3d6 creatures of 3 HD or less or a single creature of more than 3 HD. Each subject must make a save versus spells or be charmed as follows:

    ▶ Friendship: The subject regards the caster as its trusted friend and ally and will come to the caster's defence.

    ▶ Commands: If they share a language, the caster may give the charmed creature commands, which it will obey.

    ▶ Subject's nature: Commands that contradict the charmed creature's habits or alignment may be ignored.

    ▶ Suicidal commands: An affected creature never obeys suicidal or obviously harmful orders.

    Restrictions: Undead are not affected.

    Duration: The charm lasts indefinitely, but the subject is allowed to make further saves versus spells at intervals, depending on its INT score. If one of these saves succeeds, the spell ends.

    ▶ INT 3–8: The creature gains a new save once every month.

    ▶ INT 9–12: The creature gains a new save each week

    ▶ INT 13–18: The creature gains a new save once every day.
- id: magic_user_confusion
  name: Confusion
  level: 4
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 120'
  duration: 12 rounds
  description: |-
    This spell causes 3d6 subjects within 60' of one another to become confused, making them unable to independently determine what they will do.

    ▶ Subjects of 2+1 HD or greater: May save versus spells each round to resist the spell's effect, acting with free will that round if they make the save.

    ▶ Subjects of 2 HD or lower: May not make a saving throw.

    ▶ Behaviour: Roll on the following table separately for each affected subject each round to determine how that subject acts that round:

    Confusion: Subject Behaviour

    | 2d6 | Behaviour |
    | --- | --- |
    | 2–5 | Attack caster's group |
    | 6–8 | No action |
    | 9–12 | Attack subject's group |
- id: magic_user_dimension_door
  name: Dimension Door
  level: 4
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 10'
  duration: 1 round
  description: |-
    The caster or a single creature is instantly transferred to another location up to 360' distant. The destination may be selected in two ways:

    1. Known location: A location, within 360', known to the caster.
    2. An unknown location: Specified by a series of offsets (e.g. 120' north, 160' east, 80' up) totalling not more than 360'.

    Stipulations: The following apply:

    ▶ If the destination is occupied: By a solid body, the spell fails.

    ▶ If the target is unwilling: It may save versus spells to resist the teleportation.
- id: magic_user_growth_of_plants
  name: Growth of Plants
  level: 4
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 120'
  duration: permanent
  description: |-
    This spell causes vigorous growth of normal vegetation in an area within range. Plants in the affected area become thick and overgrown, entwining to form a thorny jungle.

    ▶ Area: An area of up to 3,000 square feet—selected by the caster—is affected (e.g. 150' × 20', 100' × 30', etc.).

    ▶ Passage: Only very large creatures can force their way through.
- id: magic_user_hallucinatory_terrain
  name: Hallucinatory Terrain
  level: 4
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 240'
  duration: Until touched
  description: |-
    Hallucinatory terrain either conjures an illusory terrain feature (e.g. a hill, wood, marsh, etc.) or hides an existing terrain feature.

    ▶ Area: The illusion must fit completely within the spell's range.

    ▶ Touching: If the illusion is touched by an intelligent being, the spell is negated.
- id: magic_user_massmorph
  name: Massmorph
  level: 4
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 240'
  duration: permanent
  description: |-
    A force of human-sized creatures within a 240' diameter area is veiled by illusion to appear as a copse of trees or orchard.

    ▶ Moving through: Once the illusion is in place, even creatures moving among the veiled subjects are deceived.

    ▶ Subjects who leave the affected area: Cease to be veiled.

    ▶ Dismissing: The caster may dismiss the illusion in its entirety at any time.
- id: magic_user_polymorph_others
  name: Polymorph Others
  level: 4
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 60'
  duration: permanent
  description: |-
    A living subject is changed into another type of creature, as chosen by the caster:

    ▶ HD: The spell fails if the new form's HD is more than twice the subject's HD.

    ▶ Hit points: The subject retains the same number of hit points.

    ▶ Abilities: The subject truly becomes the new form: all special abilities are acquired, along with behavioural patterns, tendencies, and intelligence.

    ▶ Specific individuals: The spell cannot be used to duplicate a specific individual.

    ▶ Reversion: If the subject dies, it returns to its original form.

    ▶ An unwilling subject: May save versus spells to negate the effect.
- id: magic_user_polymorph_self
  name: Polymorph Self
  level: 4
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: The caster
  duration: 6 turns +1 per level
  description: |-
    The caster transforms themselves into another being:

    ▶ HD: The new form may not have higher Hit Dice than the caster's level.

    ▶ Stats: The caster retains their own intelligence, hit points, saving throws, and attack probabilities.

    ▶ Physical capabilities: Of the new form (e.g. strength, physical attack forms, modes of movement) are acquired.

    ▶ Non-physical special abilities: (e.g. immunities, breath weapons, spell casting) are not acquired.

    ▶ Casting spells: While polymorphed, the caster is unable to cast spells.

    ▶ Specific individuals: The spell cannot be used to duplicate a specific individual.

    ▶ Reversion: If the caster dies while polymorphed, they return to their original form.
- id: magic_user_remove_curse
  name: Remove Curse
  level: 4
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: The caster or a creature touched
  duration: Instant / Permanent (curse)
  description: |-
    Remove curse instantaneously removes one curse from a creature. It may allow a character to discard a cursed magic item.

    Reversed: Curse

    Places a deleterious effect upon a creature, if it fails a save versus spells.

    ▶ Effects: The exact form and effects of the curse are determined by the caster.

    ▶ Maximum possible effects include: A –2 penalty to saving throws, a –4 penalty to hit, reducing an ability score by 50%.

    ▶ Multiple curses: May afflict a creature, as long as each has a different effect.

    ▶ Referee judgement: The referee should judge the effects of this spell and may turn overly powerful curses back onto the caster!
  reversible: true
  reverse_name: Curse
- id: magic_user_wall_of_fire
  name: Wall of Fire
  level: 4
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 60'
  duration: Concentration
  description: |-
    An immobile, opaque curtain of shimmering, violet fire springs into existence.

    ▶ Size: The wall can be any size, and may be shaped in any manner and to any dimensions the caster desires, up to 1,200 sq. ft. For example, it may be a straight wall or curved into a protective circle.

    ▶ Location: The wall may not be evoked so that it appears where objects are.

    ▶ Monsters with fewer than 4 HD: Cannot pass the wall of flames.

    ▶ Monsters with 4 or more HD: Take 1d6 hit points of damage when they pass through the wall. The wall deals double damage to undead creatures or creatures that use cold or are accustomed to cold.

    ▶ Concentration: The wall persists as long as the caster concentrates on the spell and does not move.
- id: magic_user_wall_of_ice
  name: Wall of Ice
  level: 4
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 120'
  duration: 12 turns
  description: |-
    An immobile, translucent, wall of ice springs into existence.

    ▶ Size: The wall can be any size, and may be shaped in any manner and to any dimensions the caster desires, up to 1,200 sq. ft. For example, it may be a straight wall or curved into a protective circle.

    ▶ Location: The wall must rest upon a solid surface and may not be evoked so that it appears where objects are.

    ▶ Monsters with fewer than 4 HD: Cannot pass the wall of ice.

    ▶ Monsters with 4 or more HD: Can break through the wall, but suffer 1d6 hit points of damage when doing so. The wall deals double damage to creatures that use fire or are accustomed to fire.
- id: magic_user_wizard_eye
  name: Wizard Eye
  level: 4
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 240'
  duration: 6 turns
  description: |-
    An invisible, magical eye is conjured that allows the caster to see at a distance.

    ▶ Movement: The eye can be directed to move within range at up to 120' per turn.

    ▶ Seeing through the eye: By concentrating, the caster can see through the eye.

    ▶ Types of vision: The magical eye grants both normal vision and infravision.

    ▶ Barriers: Solid barriers block its passage, but it can pass through a hole or space as small as 1 inch in diameter.
- id: magic_user_animate_dead
  name: Animate Dead
  level: 5
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 60'
  duration: permanent
  description: |-
    This spell turns the bones or bodies of dead creatures into undead skeletons or zombies:

    ▶ Obedient: They obey the caster's commands.

    ▶ Special abilities: They are unable to use any special abilities (including spell casting) that they possessed in life.

    ▶ Duration: They remain animated until they are destroyed or until a dispel magic spell is cast upon them.

    Number: The spell animates a number of Hit Dice of zombies or skeletons equal to the caster's level:

    ▶ Skeletons: Have AC 7 [12] and HD equal to those the creature had in life.

    ▶ Zombies: Have AC 8 [11] and HD one greater than the creature had in life.

    ▶ Classed characters: If a PC or NPC with levels in a class is reanimated by this spell, the levels are not counted as HD. For example, the reanimated corpse of a 5th level fighter would have 2 HD (1 HD as a normal human, +1 for being reanimated as a zombie).
- id: magic_user_cloudkill
  name: Cloudkill
  level: 5
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 30'
  duration: 6 turns
  description: |-
    A poisonous fog streams from the caster's fingertips, filling a 30' diameter area.

    ▶ Movement: The fog moves at 60' per turn (20' per round), driven by the wind (or away from the caster, in still conditions).

    ▶ Sinking: Because the fog is heavier than air, it sinks to the lowest level of the land, even pouring down den or sinkhole openings.

    ▶ Damage: All creatures in contact with the vapours suffer 1 hit point of damage per round of contact.

    ▶ Creatures with less than 5 Hit Dice: Must also save versus death (once per round of contact) or die.
- id: magic_user_conjure_elemental
  name: Conjure Elemental
  level: 5
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 240'
  duration: Permanent (until dismissed or slain)
  description: |-
    A 16 Hit Dice elemental—a being formed of pure elemental matter—is summoned from an elemental plane of the caster's choice (air, earth, fire, water) to do the caster's bidding.

    ▶ Materials: The summons requires a large volume of the appropriate element.

    ▶ Concentration: Is required to command an elemental.

    ▶ Dismissing: While control over the elemental is maintained, the caster may dismiss it at any time, sending it back to its plane of origin.

    ▶ Disruption: If the caster moves at more than half speed or their concentration is disturbed, the command over the elemental ends. It is, henceforth, a free-willed entity and will immediately try to kill the caster and any who get in its way.

    ▶ Dispelling: A conjured elemental may be dispelled by dispel magic or dispel evil.

    Restrictions: The caster may summon at most one elemental from each plane in a single day.

    #### Air Elemental

    Huge vortexes of whirling air.

    AC –2 [21], HD 16* (72hp), Att 1 × blow (3d8), THAC0 8 [+11], MV 360' (120') flying, SV D2 W3 P4 B3 S6 (16), ML 10, AL Neutral, XP 2,300

    ▶ Size: 32' tall, 8' across.

    ▶ Whirlwind: Creatures with less than 2HD swept aside (save versus death).

    ▶ Mundane damage immunity: Can only be harmed by magical attacks.

    ▶ Harm flying creatures: Inflict extra 1d8 damage.

    #### Earth Elemental

    Huge humanoid figures of earth or stone.

    AC –2 [21], HD 16* (72hp), Att 1 × blow (3d8), THAC0 8 [+11], MV 60' (20'), SV D2 W3 P4 B3 S6 (16), ML 10, AL Neutral, XP 2,300

    ▶ Size: 16' tall.

    ▶ Blocked by water: Cannot cross a channel wider than own height.

    ▶ Mundane damage immunity: Can only be harmed by magical attacks.

    ▶ Harm creatures on the ground: Inflict extra 1d8 damage.

    #### Fire Elemental

    Whirling columns of fire.

    AC –2 [21], HD 16* (72hp), Att 1 × blow (3d8), THAC0 8 [+11], MV 120' (40'), SV D2 W3 P4 B3 S6 (16), ML 10, AL Neutral, XP 2,300

    ▶ Size: 16' tall, 16' across.

    ▶ Blocked by water: Cannot cross a channel wider than own diameter.

    ▶ Mundane damage immunity: Can only be harmed by magical attacks.

    ▶ Harm cold-based creatures: Inflict extra 1d8 damage.

    #### Water Elemental

    Huge waves of water.

    AC –2 [21], HD 16* (72hp), Att 1 × blow (3d8), THAC0 8 [+11], MV 60' (20') / 180' (60') swimming, SV D2 W3 P4 B3 S6 (16), ML 10, AL Neutral, XP 2,300

    ▶ Size: 8' tall, 32' across.

    ▶ Water-bound: Must remain within 60' of water.

    ▶ Mundane damage immunity: Can only be harmed by magical attacks.

    ▶ Harm creatures in water: Inflict extra 1d8 damage.
- id: magic_user_contact_higher_plane
  name: Contact Higher Plane
  level: 5
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: The caster
  duration: One conversation
  description: |-
    A channel of communication is opened to a higher plane of existence, allowing the caster to ask powerful, otherworldly beings for advice and knowledge on any subject.

    ▶ Plane: The caster must choose which plane of existence to contact: communion with beings of the 3rd to 12th planes is possible via this spell. Higher numbered planes are home to more powerful and knowledgeable beings.

    ▶ Questions: The caster may then ask a number of simple yes/no questions equal to the number of the plane contacted. The referee plays the role of the contacted being, responding to the caster's questions.

    ▶ Answers: For each question asked, there is a chance of the contacted being not knowing the answer or of answering untruthfully: see the table to the right. It is impossible to detect whether the entity is lying.

    Restrictions: Casting contact higher plane is a great and perilous deed.

    ▶ Usage limit: It may be cast at most once per week. (The referee may limit the spell's usage to even less frequently, if desired.)

    ▶ Insanity: Communion with otherworldly beings of great power can shatter the caster's sanity. The basic chance is shown in the table above. For every level of the caster above 11, this chance is reduced by 5%. If the caster is driven insane as a result of the communion, the recovery time is a number of weeks equal to the number of the plane contacted.

    Contact Higher Plane Questions

    | Plane | #Qs | Don't Know | Truth | Insanity |
    | --- | --- | --- | --- | --- |
    | 3rd | 3 | 75% | 50% | 5% |
    | 4th | 4 | 70% | 55% | 10% |
    | 5th | 5 | 65% | 60% | 15% |
    | 6th | 6 | 60% | 65% | 20% |
    | 7th | 7 | 50% | 70% | 25% |
    | 8th | 8 | 40% | 75% | 30% |
    | 9th | 9 | 30% | 80% | 35% |
    | 10th | 10 | 20% | 85% | 40% |
    | 11th | 11 | 10% | 90% | 45% |
    | 12th | 12 | 5% | 95% | 50% |
- id: magic_user_feeblemind
  name: Feeblemind
  level: 5
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 240'
  duration: permanent
  description: |-
    An arcane spell caster (e.g. a magic-user or elf) within range must save versus spells (at a –4 penalty) or become an imbecile, unable to think clearly or cast spells.
- id: magic_user_hold_monster
  name: Hold Monster
  level: 5
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 120'
  duration: 6 turns +1 per level
  description: |-
    This spell causes one or more creatures to be paralysed if they fail a saving throw versus spells. It may be cast in two ways:

    1. Against an individual: The target's saving throw is penalised by –2.
    2. Against a group: 1d4 individuals in the group are targeted.

    Restrictions: Undead are not affected.
- id: magic_user_magic_jar
  name: Magic Jar
  level: 5
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: The caster
  duration: Special
  description: |-
    The caster's body enters a comatose trance as their life-force is transferred into a receptacle (any inanimate object within 30'), known as a magic jar. From there, the caster may attempt to possess the bodies of other creatures.

    When the caster's life-force is in the magic jar:

    ▶ Possession: The caster may attempt to possess the body of another creature within 120'. The victim may save versus spells to resist possession. If the save is successful, the caster may not make another attempt to possess that victim for one turn. If the save fails, the caster's life-force leaves the magic jar and enters the victim, possessing it.

    ▶ Returning: The caster may choose to return to their own body at any time, ending the spell.

    ▶ If the magic jar is destroyed: The caster dies.

    ▶ If the caster's own body is destroyed: Their life-force is stranded in the magic jar.

    When the caster's life-force is possessing a victim:

    ▶ Control: The caster gains full control over the victim's body, but is not able to make the victim cast spells.

    ▶ If the magic jar is destroyed: The spell ends and the caster's life-force is trapped in the possessed body.

    ▶ If the possessed victim is killed: The caster's life-force returns to the magic jar.

    ▶ Dispelling: Dispel evil forces the caster's life-force back into the magic jar.

    ▶ If the caster's own body is destroyed: Their life-force is stranded in the body of the creature being possessed.
- id: magic_user_pass_wall
  name: Pass-Wall
  level: 5
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 30'
  duration: 3 turns
  description: |-
    A 5' diameter hole is temporarily opened in solid rock or stone, forming a passageway up to 10' deep.
- id: magic_user_telekinesis
  name: Telekinesis
  level: 5
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 120'
  duration: Concentration (up to 6 rounds)
  description: |-
    By concentrating, the caster is able to move objects or creatures by the power of thought.

    ▶ Weight: Up to 200 coins of weight per level of the caster may be targeted.

    ▶ Movement: The target may be moved up to 20' per round, in whatever direction the caster wishes (including vertically).

    ▶ Save: If a creature is targeted, it may save versus spells to resist the spell.

    ▶ Concentration: If the caster's concentration is broken, the target will fall.
- id: magic_user_teleport
  name: Teleport
  level: 5
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 10'
  duration: instant
  description: |-
    The caster or a chosen creature vanishes and reappears at a location of the caster's choosing.

    ▶ Gear: The subject is teleported with all its gear, up to its maximum load.

    ▶ Unwilling subjects: May save versus spells to prevent the teleportation.

    ▶ Destination: May be at any distance, but must be known to the caster. The destination must be an open space at ground level. (It is not possible to intentionally teleport the subject into mid-air or into solid matter.)

    ▶ Risk: There is a risk, when teleporting, of accidentally arriving above or below ground level. The chance of a successful teleportation depends on the caster's knowledge of the destination (see right). Roll d% and consult the table below.

    Teleport Result

    | Knowledge of Dest. | Ground Level | Too High | Too Low |
    | --- | --- | --- | --- |
    | Scant | 01–50 | 51–75 | 76–00 |
    | Moderate | 01–80 | 81–90 | 91–00 |
    | Exact | 01–95 | 96–99 | 00 |

    Ground level: The subject appears at the desired destination.

    Too high: The subject appears 1d10×10' above the intended destination. Should this location already be occupied by solid matter, the subject is instantly killed. Otherwise, the subject falls from a height.

    Too low: The subject appears in the ground and is killed instantly.

    Knowledge of destination: The caster's knowledge of the destination is rated as follows:

    ▶ Scant: A location that the caster has visited once or twice, has seen by magical scrying, or has heard of from descriptions.

    ▶ Moderate: A location that the caster has visited often or has studied via scrying for several weeks.

    ▶ Exact: A location that the caster has made a detailed study of, in person.
- id: magic_user_transmute_rock_to_mud
  name: Transmute Rock to Mud
  level: 5
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 120'
  duration: 3d6 days / Permanent (transmute mud to rock)
  description: |-
    This spell turns up to 3,000 square feet of rock into 10' deep mud.

    ▶ Movement: Any creatures passing through the mud have their movement rate reduced by 90%.

    Reversed: Transmute Mud to Rock

    Changes an area of mud—up to 3,000 square feet and up to 10' deep—into rock. This alteration is permanent.
  reversible: true
  reverse_name: Transmute Mud to Rock
- id: magic_user_wall_of_stone
  name: Wall of Stone
  level: 5
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 60'
  duration: permanent
  description: |-
    A wall of solid rock appears.

    ▶ Size: The wall may be of whatever shape the caster desires and is of 1,000 cubic feet in volume. (For example, a 2' thick wall, 50' long and 10' high.)

    ▶ Location: The wall must rest upon a solid surface and may not be evoked so that it appears where objects are.
- id: magic_user_anti_magic_shell
  name: Anti-Magic Shell
  level: 6
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: The caster
  duration: 12 turns
  description: |-
    An anti-magic barrier is created around the caster.

    ▶ Blocks magic: No spells or spell effects can pass through this barrier, whether from inside or outside.

    ▶ Dismissing: The caster may end this spell at any time before the duration has expired.
- id: magic_user_control_weather
  name: Control Weather
  level: 6
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 240 yards around the caster
  duration: Concentration
  description: |-
    By concentrating (no movement allowed), the caster causes one of the following conditions to manifest around themselves. This spell only functions outdoors.

    ▶ Calm: Clears bad weather (though side-effects—e.g. mud after rain—remain.)

    ▶ Extreme heat: Dries up snow or mud (including transmute rock to mud). Creatures in the area move at half normal rate.

    ▶ Fog: Visibility drops to 20'. Creatures in the fog move at half their normal rate. At the referee's option, they may also have a chance of getting lost.

    ▶ High winds: Movement rates are halved. Missile fire and flight are impossible. High winds may be used to increase the sailing speed of ships by 50%, if they travel with the wind. In sandy areas, may cause a sandstorm, reducing visibility to 20'.

    ▶ Rain: –2 penalty to missile attacks. Mud forms in 3 turns, halving movement rates.

    ▶ Snow: Visibility drops to 20'. Movement rates are halved. Bodies of water may freeze. After the snow thaws, mud remains and still impedes movement.

    ▶ Tornado: The caster can direct the tornado, which moves at 120' per round. The tornado can be directed to attack (see stats below). Ships caught in a tornado have a 75% chance of suffering 12 points of hull damage.

    #### Tornado

    A whirling column of air, 24' high and 6' across, that wreaks havoc for flying creatures and ships.

    AC 0 [19], HD 12* (54hp), Att 1 × blow (2d8), THAC0 10 [+9], MV 360' (120') flying, SV D6 W7 P8 B8 S10 (12), ML 10, AL Neutral, XP 1,900

    ▶ Whirlwind: Creatures with less than 2HD swept aside (save versus death).

    ▶ Mundane damage immunity: Can only be harmed by magical attacks.

    ▶ Harm flying creatures: Inflict extra 1d8 damage.
- id: magic_user_death_spell
  name: Death Spell
  level: 6
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 240'
  duration: instant
  description: |-
    Up to 4d8 Hit Dice of creatures within a 60' cube area must save versus death or die, instantly.

    Restrictions: Undead and creatures with greater than 7 Hit Dice are unaffected.
- id: magic_user_disintegrate
  name: Disintegrate
  level: 6
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 60'
  duration: instant
  description: |-
    The material form of a single, non-magical creature or object is instantly and permanently destroyed.

    ▶ If a creature is targeted: It may save versus death to resist disintegration.

    ▶ Examples of objects: The following might be targeted: a tree, a ship, a 10' section of wall.
- id: magic_user_geas
  name: Geas
  level: 6
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 30'
  duration: Permanent / Instant (remove geas)
  description: |-
    The caster commands a subject to perform or avoid performing a specific action.

    ▶ Examples: Bringing a specific item to the caster, eating or drinking without restraint, keeping a certain fact secret.

    ▶ Impossible or deadly tasks: The prescribed geas must not be impossible or directly deadly—if such a geas is cast, it affects the caster, instead.

    ▶ Saving throw: The subject may save versus spells, to avoid coming under the spell's effect.

    ▶ If the save fails: The subject must follow the stipulated course of action or suffer gradually increasing (and eventually fatal) penalties determined by the referee (e.g. penalties to attack, ability score reductions, inability to memorize spells, physical torment and feebleness, etc.).

    Reversed: Remove Geas

    Can dispel an active geas spell and any incurred penalties. If the caster of the geas to be nullified is higher level than the character casting remove geas, there is a chance of the spell having no effect. The probability of spell failure is 5% per level the caster is below the caster of geas.
  reversible: true
  reverse_name: Remove Geas
- id: magic_user_invisible_stalker
  name: Invisible Stalker
  level: 6
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: Summoned to caster's presence
  duration: One mission
  description: |-
    An invisible stalker (see below) is summoned to the caster's presence and magically bound to perform a mission of the caster's choosing.

    ▶ Wording: The caster must be careful with the wording of the mission. Invisible stalkers are treacherous and, unless the assigned mission can be easily and quickly accomplished, will follow the letter of the command while twisting the intent.

    ▶ Duration: The creature is bound to attempt the mission until it succeeds or is destroyed.

    ▶ Banishing: The spell dispel evil will banish an invisible stalker, ending the spell.

    #### Invisible Stalker

    Highly intelligent, magical creatures summoned from another plane of existence to perform tasks for powerful magic-users.

    AC 3 [16], HD 8* (36hp), Att 1 × blow (4d4), THAC0 12 [+7], MV 120' (40'), SV D8 W9 P10 B10 S12 (F8), ML 12, AL Neutral, XP 1,200

    ▶ Tracking: Without fault.

    ▶ Surprise: On a 1–5, unless target can detect invisibility.

    ▶ If killed: Returns to plane of origin.
- id: magic_user_lower_water
  name: Lower Water
  level: 6
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 240'
  duration: 10 turns
  description: |-
    This spell reduces the depth of a body of water by half for the duration. An area of up to 10,000 square feet may be affected.
- id: magic_user_move_earth
  name: Move Earth
  level: 6
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 240'
  duration: 6 turns
  description: |-
    Earth (but not stone) within range is rearranged as the caster wishes.

    ▶ Movement rate: The caster can move earth in the area at up to 60' per turn.

    ▶ Excavations: The range of the spell also extends downwards, allowing excavations to be made.
- id: magic_user_part_water
  name: Part Water
  level: 6
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 120'
  duration: 6 turns
  description: |-
    The caster creates a path 10' wide and a maximum of 120' long through water, such as a pond, lake, or other body. The caster can dismiss the spell's effect before the duration ends.
- id: magic_user_projected_image
  name: Projected Image
  level: 6
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: 240'
  duration: 6 turns
  description: |-
    An illusory duplicate of the caster appears within range.

    ▶ Duplicate: The image is an exact duplicate of the caster that can only be differentiated by touch.

    ▶ Subsequent spells cast: Appear to originate from the image. (Targets must still be visible to the caster, however.)

    ▶ Spells and missiles: The image appears unaffected by spells or missile weapons.

    ▶ Melee or touch: If the image is touched or hit in melee, it disappears.
- id: magic_user_reincarnation
  name: Reincarnation
  level: 6
  spell_lists: [magic_user]
  source: ose_classic_fantasy
  range: Appears in the caster's presence
  duration: permanent
  description: |-
    A dead character is returned to life in a new physical form that manifests in the presence of the caster. The character's new body is not necessarily the same as the original; it is determined by rolling on the Reincarnated Class table opposite.

    The roll indicates either a character class or a monster:

    ▶ Character class: The character is of experience level 1d6 (or at most the same level as the character achieved before death). The reincarnated character can continue to gain experience and advance as normal, in the new class.

    ▶ Monster: The type should be determined by the referee. The monster should be at least partially intelligent, have no greater Hit Dice than the level of the character being reincarnated (at most 6 HD), and be of the same alignment. The tables opposite may be used, or the referee may create their own tables. Monsters cannot gain experience or advance in level.

    Reincarnation: Class

    | d10 | Reincarnation |
    | --- | --- |
    | 1 | Cleric |
    | 2 | Dwarf |
    | 3 | Elf |
    | 4 | Fighter |
    | 5 | Halfling |
    | 6 | Magic-user |
    | 7 | Thief |
    | 8 | Monster (roll on alignment table) |
    | 9–10 | Same class and race |

    Reincarnation: Lawful Monsters

    | d6 | Reincarnation | HD |
    | --- | --- | --- |
    | 1 | Brownie or gnome | 1 |
    | 2 | Neanderthal | 2 |
    | 3 | Pegasus | 2 |
    | 4 | Blink dog | 4 |
    | 5 | Unicorn | 4 |
    | 6 | Roc, small | 6 |

    Reincarnation: Neutral Monsters

    | d6 | Reincarnation | HD |
    | --- | --- | --- |
    | 1 | Pixie or sprite | 1 |
