# Minimal, representative Phase-1 enchantment seed.  Bulk import is Phase 2.

- id: generic_plus_1
  name_template: "{base} +1"
  kind: weapon
  applies_to:
    include: [any_weapon]
    exclude: [sword]          # swords get their own +1 lines; no double-coverage
  magic_bonus: 1
  description: "+1 to attack and damage rolls."

- id: sword_plus_1
  name_template: "{base} +1"
  kind: weapon
  applies_to:
    include: [sword]
  magic_bonus: 1
  description: "+1 to attack and damage rolls."

- id: sword_plus_1_vs_undead
  name_template: "{base} +1, +3 vs Undead"
  kind: weapon
  applies_to:
    include: [sword]
  magic_bonus: 1
  conditional_bonus: {vs: undead, bonus: 2}
  description: "+1 normally; +3 to attack and damage versus undead."

- id: short_sword_of_quickness
  name_template: "{base} +2, Quickness"
  kind: weapon
  applies_to:
    include: [short_sword]
  magic_bonus: 2
  description: |-
    Enables the bearer to strike with great speed.
    Initiative: When attacking with the sword, the wielder always strikes first
    in the round, as if they had won initiative.

- id: luck_blade
  name_template: "{base} +1, Luck Blade"
  kind: weapon
  applies_to:
    include: [sword]
  magic_bonus: 1
  modifiers:
    - {target: "save:all", op: add, value: 1}
  charge_dice: "1d4"
  description: |-
    Grants the wielder protection and a number of wishes.
    Protection: +1 bonus to all saves.
    Charges: The sword grants a total of 1d4 wishes.

- id: trident_fish_command
  name_template: "{base} of Fish Command"
  kind: weapon
  applies_to:
    include: [trident]
  magic_bonus: 1
  charge_dice: "2d6"
  description: "Commands fish/sea creatures while charges remain."

- id: armour_plus_1
  name_template: "{base} +1"
  kind: armor
  applies_to:
    include: [any_armour]
  magic_bonus: 1
  description: "+1 bonus to Armour Class."

- id: shield_plus_1
  name_template: "{base} +1"
  kind: shield
  applies_to:
    include: [any_shield]
  magic_bonus: 1

# Ammunition enchantments
- id: arrows_plus_1
  name_template: "{base} +1"
  kind: ammunition
  applies_to: {include: [arrow]}
  magic_bonus: 1
  description: "+1 to attack and damage rolls while these arrows are loaded."

- id: arrows_plus_2
  name_template: "{base} +2"
  kind: ammunition
  applies_to: {include: [arrow]}
  magic_bonus: 2
  description: "+2 to attack and damage rolls while these arrows are loaded."

- id: arrow_slaying
  name_template: "{base} of Slaying"
  kind: ammunition
  applies_to: {include: [arrow]}
  magic_bonus: 1
  description: |-
    Enchanted to kill a certain type of foe (chosen by the referee). Acts as a
    +3 arrow against that foe and slays it instantly on a hit; otherwise a
    +1 arrow.

- id: crossbow_bolts_plus_1
  name_template: "{base} +1"
  kind: ammunition
  applies_to: {include: [crossbow_bolt]}
  magic_bonus: 1
  description: "+1 to attack and damage rolls while these bolts are loaded."

- id: crossbow_bolts_plus_2
  name_template: "{base} +2"
  kind: ammunition
  applies_to: {include: [crossbow_bolt]}
  magic_bonus: 2
  description: "+2 to attack and damage rolls while these bolts are loaded."

- id: sling_bullet_impact
  name_template: "{base} +1, Impact"
  kind: ammunition
  applies_to: {include: [sling_stone]}
  magic_bonus: 1
  description: |-
    A cast metal bullet engraved with runes. +1 to attack and damage; on a
    hit that beats the required roll, inflicts extra damage equal to the
    margin of success.

# Armour enchantments
- id: armour_plus_2
  name_template: "{base} +2"
  kind: armor
  applies_to: {include: [any_armour]}
  magic_bonus: 2
  description: "+2 bonus to Armour Class. Enchanted armour weighs half as much."

- id: armour_plus_3
  name_template: "{base} +3"
  kind: armor
  applies_to: {include: [any_armour]}
  magic_bonus: 3
  description: "+3 bonus to Armour Class. Enchanted armour weighs half as much."

- id: cursed_armour_minus_1
  name_template: "{base} -1"
  kind: armor
  applies_to: {include: [any_armour]}
  magic_bonus: -1
  cursed: true
  description: |-
    All tests indicate a +1 bonus, but in deadly combat the curse is revealed:
    worsens the wearer's Armour Class by 1. Cannot be removed without magic.

- id: cursed_armour_minus_2
  name_template: "{base} -2"
  kind: armor
  applies_to: {include: [any_armour]}
  magic_bonus: -2
  cursed: true
  description: |-
    All tests indicate a +1 bonus, but in deadly combat the curse is revealed:
    worsens the wearer's Armour Class by 2. Cannot be removed without magic.

- id: cursed_armour_ac_9
  name_template: "{base} (Cursed, AC 9)"
  kind: armor
  applies_to: {include: [any_armour]}
  magic_bonus: 0
  cursed: true
  modifiers:
    - {target: ac, op: set, value: 9}
  description: |-
    All tests indicate a +1 bonus, but in deadly combat the curse sets the
    wearer's base Armour Class to 9 [10] (before Dexterity). Cannot be removed
    without magic.

