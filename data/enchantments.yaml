# Minimal, representative Phase-1 enchantment seed.  Bulk import is Phase 2.

- id: generic_plus_1
  name_template: "{base} +1"
  kind: weapon
  applies_to:
    include: [any_weapon]
    exclude: [sword]          # swords get their own +1 lines; no double-coverage
  magic_bonus: 1
  description: "+1 to attack and damage rolls."

- id: sword_plus_1
  name_template: "{base} +1"
  kind: weapon
  applies_to:
    include: [sword]
  magic_bonus: 1
  description: "+1 to attack and damage rolls."

- id: sword_plus_1_vs_undead
  name_template: "{base} +1, +3 vs Undead"
  kind: weapon
  applies_to:
    include: [sword]
  magic_bonus: 1
  conditional_bonus: {vs: undead, bonus: 2}
  description: "+1 normally; +3 to attack and damage versus undead."

- id: short_sword_of_quickness
  name_template: "{base} of Quickness"
  kind: weapon
  applies_to:
    include: [short_sword]
  magic_bonus: 1
  description: "Always wins initiative; +1 to attack and damage."

- id: luck_blade
  name_template: "{base} of Luck"
  kind: weapon
  applies_to:
    include: [sword]
  magic_bonus: 1
  modifiers:
    - {target: "save:all", op: add, value: 1}
  description: "+1 to attack and damage; +1 to all saving throws while held."

- id: trident_fish_command
  name_template: "{base} of Fish Command"
  kind: weapon
  applies_to:
    include: [trident]
  magic_bonus: 1
  charge_dice: "2d6"
  description: "Commands fish/sea creatures while charges remain."

- id: armour_plus_1
  name_template: "{base} +1"
  kind: armor
  applies_to:
    include: [any_armour]
  magic_bonus: 1
  description: "+1 bonus to Armour Class."

- id: shield_plus_1
  name_template: "{base} +1"
  kind: shield
  applies_to:
    include: [any_shield]
  magic_bonus: 1

# Ammunition enchantments
- id: arrows_plus_1
  name_template: "{base} +1"
  kind: ammunition
  applies_to: {include: [arrow]}
  magic_bonus: 1
  description: "+1 to attack and damage rolls while these arrows are loaded."

- id: arrows_plus_2
  name_template: "{base} +2"
  kind: ammunition
  applies_to: {include: [arrow]}
  magic_bonus: 2
  description: "+2 to attack and damage rolls while these arrows are loaded."

- id: arrow_slaying
  name_template: "{base} of Slaying"
  kind: ammunition
  applies_to: {include: [arrow]}
  magic_bonus: 1
  description: |-
    Enchanted to kill a certain type of foe (chosen by the referee). Acts as a
    +3 arrow against that foe and slays it instantly on a hit; otherwise a
    +1 arrow.

- id: crossbow_bolts_plus_1
  name_template: "{base} +1"
  kind: ammunition
  applies_to: {include: [crossbow_bolt]}
  magic_bonus: 1
  description: "+1 to attack and damage rolls while these bolts are loaded."

- id: crossbow_bolts_plus_2
  name_template: "{base} +2"
  kind: ammunition
  applies_to: {include: [crossbow_bolt]}
  magic_bonus: 2
  description: "+2 to attack and damage rolls while these bolts are loaded."

- id: sling_bullet_impact
  name_template: "{base} +1, Impact"
  kind: ammunition
  applies_to: {include: [sling_stone]}
  magic_bonus: 1
  description: |-
    A cast metal bullet engraved with runes. +1 to attack and damage; on a
    hit that beats the required roll, inflicts extra damage equal to the
    margin of success.
  description: "+1 bonus to Armour Class from the shield."
