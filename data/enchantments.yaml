  name_template: "{base} +2"
  kind: shield
  applies_to: {include: [any_shield]}
  magic_bonus: 2
  description: "+2 bonus to Armour Class from the shield."

- id: shield_plus_3
  name_template: "{base} +3"
  kind: shield
  applies_to: {include: [any_shield]}
  magic_bonus: 3
  description: "+3 bonus to Armour Class from the shield."

- id: cursed_shield_minus_2
