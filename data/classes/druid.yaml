features:
- id: alignment
  name: Alignment
  text: Druids regard the ways of the natural world as the ideal state of things. They see the concepts of Law and Chaos as extremes that are both equally against nature. Thus, druids must be neutral in alignment.
  gained_at_level: 1
- id: charm_immunity
  name: Charm Immunity
  text: |-
    Druids of 7th level and above are immune to the charms of fairies and Sylvan creatures (e.g. dryads, nixies).
  gained_at_level: 1
- id: combat
  name: Combat
  text: |-
    The holy doctrine of the druids stipulates that they may not use metal armour or shields (wooden shields may be purchased at the normal price). Their choice of weapons is limited to clubs, daggers, slings, spears, and staves.
  gained_at_level: 1
- id: divine_magic
  name: Divine Magic
  text: |-
    See Magic, p110 for full details on divine magic.

    **Holy symbol:** A druid must carry a holy symbol: a sprig of mistletoe which the character must harvest.

    **Deity disfavour:** Druids must be faithful to the tenets of their alignment and religion. Druids who fall from favour with their deity may incur penalties.

    **Magical research:** A druid of any level may spend time and money on magical research. This allows them to create new spells or other magical effects associated with their deity. When a druid reaches 9th level, they are also able to create magic items.

    **Spell casting:** A druid may pray to receive spells from nature. The power and number of spells available to a druid are determined by the character’s experience level. The list of spells available to druids is found on p117.

    **Using magic items:** As spell casters, druids can use magic scrolls of spells on their spell list. They can also use items that may only be used by divine spell casters (e.g. some staves). Druids may not use magical books or tomes.
  gained_at_level: 1
- id: energy_resistance
  name: Energy Resistance
  text: |-
    Druids gain a +2 bonus to saving throws against electricity (lightning) and fire.
  gained_at_level: 1
- id: identification
  name: Identification
  text: |-
    Druids can identify all plants and animals and can discern pure water.
  gained_at_level: 1
- id: languages
  name: Languages
  text: |-
    Druids speak a secret tongue known only to their sect. At each level above 2nd, a druid also learns to speak a language used by creatures of Sylvan forests (e.g. dryads, green dragons, pixies, treants).
  gained_at_level: 1
- id: pass_without_trace
  name: Pass Without Trace
  text: |-
    From 3rd level, a druid can pass through natural environments without leaving any tracks. The character is also able to move through overgrown areas at normal speed and without impediment.
  gained_at_level: 3
- id: path_finding
  name: Path-Finding
  text: |-
    A party with a druid has only a 1-in-6 chance of getting lost in woodlands. See Wilderness Adventuring, p212.
  gained_at_level: 1
- id: shape_change
  name: Shape Change
  text: |-
    At 7th level, a druid gains the power to change into the form of a reptile, bird, and mammal (once per day each). The animal may be of any size up to around twice the bulk of the druid’s normal form. If a druid has lost hit points, they regain 1d4 hit points per level upon changing into an animal. All equipment carried by the druid is absorbed into the animal form and reappears when the druid changes back.
  gained_at_level: 7
- id: reaching_12th_level_and_above
  name: Reaching 12th Level and Above
  text: |-
    There can only be nine druids of 12th level. When a druid has enough experience to reach 12th level, they must challenge an existing 12th level druid. The character only advances to 12th level if the other druid is defeated. Such challenges may take any form that is agreed by both parties, including combat (which need not be fatal). Likewise, there can only be three druids of 13th level and a single druid (known as the arch-druid) of 14th level.

    Druids who attain 12th level or above may build a stronghold integrated into a natural setting.
  gained_at_level: 12
