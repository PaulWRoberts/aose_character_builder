  5: {xp_required: 24000, thac0: 17, saves: {death: 10, wands: 11, paralysis: 12, breath: 11, spells: 14}}
  6: {xp_required: 45000, thac0: 17, saves: {death: 10, wands: 11, paralysis: 12, breath: 11, spells: 14}}
