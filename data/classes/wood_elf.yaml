features:
- id: prime_requisites
  name: Prime requisites
  text: A wood elf with at least 13 DEX and WIS gains a 5% bonus to experience. A wood elf with a DEX of at least 16 and a WIS of at least 13 receives a +10% XP bonus.
  gained_at_level: 1
- id: combat
  name: Combat
  text: |-
    Because of their need for stealth and free movement, wood elves cannot wear armour heavier than leather. They can use shields and any weapon.
  gained_at_level: 1
- id: awareness
  name: Awareness
  text: |-
    Wood elves are only surprised on a roll of 1. This may mean that a wood elf is able to act in the surprise round while their companions are surprised.
  gained_at_level: 1
- id: detect_secret_doors
  name: Detect Secret Doors
  text: |-
    Wood elves have keen eyes that allow them, when actively searching, to detect hidden and secret doors with a 2-in-6 chance (see Dungeon Adventuring in Old-School Essentials).
  gained_at_level: 1
- id: divine_magic
  name: Divine Magic
  text: |-
    See Magic in Old-School Essentials for full details on divine magic.

    **Deity disfavour:** Wood elves must be faithful to the tenets of their alignment and religion. Wood elves who fall from favour with their deity may incur penalties.

    **Magical research:** A wood elf of any level may spend time and money on magical research. This allows them to create new spells or other magical effects associated with their deity. When a wood elf reaches 9th level, they are also able to create magic items.

    **Spell casting:** A wood elf may pray to receive spells from nature. The power and number of spells available to a wood elf are determined by the character's experience level. Wood elves have the same spell selection as druids.

    **Using magic items:** As spell casters, wood elves can use magic scrolls of spells on their spell list. They can also use items that may only be used by divine spell casters (e.g. some staves).
  gained_at_level: 1
- id: foraging_and_hunting
  name: Foraging and Hunting
  text: |-
    A party with a wood elf succeeds at foraging with a 2-in-6 chance and finds prey when hunting with a 5-in-6 chance (see Wilderness Adventuring in Old-School Essentials).
  gained_at_level: 1
- id: hiding
  name: Hiding
  text: |-
    Wood elves have an uncanny ability to disappear from sight. In woods or undergrowth, a wood elf can hide with a 90% chance of success.
  gained_at_level: 1
- id: immunity_to_ghoul_paralysis
  name: Immunity to Ghoul Paralysis
  text: |-
    Wood elves are completely unaffected by the paralysis that ghouls can inflict.
  gained_at_level: 1
- id: infravision
  name: Infravision
  text: |-
    Wood elves have infravision to 60' (see Darkness under Hazards and Challenges in Old-School Essentials).
  gained_at_level: 1
- id: listening_at_doors
  name: Listening at Doors
  text: |-
    Wood elves have a 2-in-6 chance of hearing noises (see Dungeon Adventuring in Old-School Essentials).
  gained_at_level: 1
- id: missile_attack_bonus
  name: Missile Attack Bonus
  text: |-
    Wood elves' keen coordination grants them a +1 bonus to attack rolls with all missile weapons.
  gained_at_level: 1
  granted_modifiers:
  - {target: attack, op: add, value: 1, condition: ranged}
- id: after_reaching_9th_level
  name: After Reaching 9th Level
  text: |-
    A wood elf may construct a treetop stronghold in the depths of the forest, blending in with the natural environment of a site of great beauty. The stronghold must be made of wood, but construction costs as much as similar work in stone, due to the exquisite quality of craftsmanship involved.

    Forest animals within a 5 mile radius of the completed stronghold will become friends with the wood elves. They may warn of intruders, carry messages and news, and so on. In exchange for this friendship, the wood elf ruler must protect the animals from harm.

    A wood elf ruler may only hire elven mercenaries. Specialists and retainers of any race may be hired.
  gained_at_level: 9
