<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AOSE Character Builder{% endblock %}</title>
    <link rel="stylesheet" href="/static/sheet.css">
    {% block head %}{% endblock %}
</head>
<body>
    <header class="topbar">
        <a href="/" class="brand">AOSE Character Builder</a>
        <nav>
            <a href="/settings">Settings</a>
            {% set session_email = request.scope.get("session", {}).get("email", "") %}
            {% if session_email %}
              <a href="/logout" class="logout-link">Sign out ({{ session_email }})</a>
            {% endif %}
        </nav>
    </header>
    <main class="page">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
