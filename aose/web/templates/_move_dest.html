{# Destination <select> for a Move form.  ``targets`` is a flat list of
   {kind, id, label} dicts from storage.move_targets.  ``ref`` is {category, id}.
   Excludes the current (cur_kind, cur_id) location and, when moving a container,
   all container targets.  inventory.js copies data-kind/data-id into the hidden
   dest_kind/dest_id inputs on select-change so the form auto-submits without a
   button (except for coin/gem/ammo which need a count first). #}
{% macro move_dest_control(targets, ref, cur_kind, cur_id) %}
  <select class="move-dest">
    <option value="" disabled selected>Move to…</option>
    {% for t in targets %}
      {% set skip_same = t.kind == cur_kind and (t.id or '') == (cur_id or '') %}
      {% set skip_container = ref.category == 'container' and t.kind == 'container' %}
      {% if not skip_same and not skip_container %}
      <option data-kind="{{ t.kind }}" data-id="{{ t.id or '' }}">{{ t.label }}</option>
      {% endif %}
    {% endfor %}
  </select>
  <input type="hidden" class="dest-kind" name="dest_kind" value="">
  <input type="hidden" class="dest-id" name="dest_id" value="">
{% endmacro %}
