<h2>Step 5: Roll Hit Points</h2>
<p>{{ class_name }} rolls <strong>{{ hit_die }}</strong> for level 1 HP.
   CON modifier: <strong>{{ "%+d"|format(con_mod) }}</strong>.</p>

{% if draft.hp_roll %}
<div class="hp-display">
    <div class="stat-row"><span>Rolled</span><span class="stat-big">{{ draft.hp_roll }}</span></div>
    <div class="stat-row"><span>Total HP</span><span class="stat-big">{{ total_hp }}</span></div>
</div>
{% endif %}

<form method="post" action="/wizard/{{ draft_id }}/hp/roll" class="inline-form">
    <button type="submit">{% if draft.hp_roll %}Re-roll{% else %}Roll HP{% endif %}</button>
</form>

{% if draft.hp_roll %}
<form method="post" action="/wizard/{{ draft_id }}/hp" class="step-form">
    <button type="submit" class="primary">Next: Review &rarr;</button>
</form>
{% endif %}
