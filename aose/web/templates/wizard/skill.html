<h2>Secondary Skill</h2>
<p>Before {{ draft.name }} took to adventuring, they trained in a humble trade.
   We've rolled one for you &mdash; re-roll, or pick a different one from the list.</p>

<div class="skill-display">
    <div class="stat-row">
        <span>Currently rolled</span>
        <span class="stat-big">{{ current_skill }}</span>
    </div>
</div>

<form method="post" action="/wizard/{{ draft_id }}/skill/reroll" class="inline-form">
    <button type="submit">Re-roll</button>
</form>

<form method="post" action="/wizard/{{ draft_id }}/skill" class="step-form">
    <label class="field">
        <span>Pick a skill</span>
        <select name="secondary_skill">
            {% for s in skills %}
            <option value="{{ s }}" {% if s == current_skill %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
        </select>
    </label>
    <button type="submit" class="primary">Next: Hit Points &rarr;</button>
</form>
