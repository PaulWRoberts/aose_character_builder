<h2>Step 3: Choose Class</h2>
<p class="muted">Filtered by your race ({{ race_name }}) and ability scores.</p>

<form method="post" action="/wizard/{{ draft_id }}/class" class="step-form">
    <div class="card-grid">
    {% for cls in classes %}
        <label class="card {% if not cls.available %}disabled{% endif %} {% if cls.selected %}selected{% endif %}">
            <input type="radio" name="class_id" value="{{ cls.id }}" required
                   {% if not cls.available %}disabled{% endif %}
                   {% if cls.selected %}checked{% endif %}>
            <div class="card-name">{{ cls.name }}</div>
            <div class="card-detail">HD: {{ cls.hit_die }}</div>
            <div class="card-detail">Prime: {{ cls.prime_requisites | join(", ") }}</div>
            {% if cls.level_cap %}
            <div class="card-detail">{{ race_name }} max level: {{ cls.level_cap }}</div>
            {% endif %}
            {% if not cls.allowed_by_race %}
            <div class="card-detail warn">Not available to {{ race_name }}</div>
            {% elif not cls.meets_abilities %}
            <div class="card-detail warn">Ability requirements not met</div>
            {% endif %}
        </label>
    {% endfor %}
    </div>
    <button type="submit" class="primary">Next: Alignment &rarr;</button>
</form>
